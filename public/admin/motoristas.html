<!DOCTYPE html> 
<html lang="pt-BR"> 
<head> 
  <meta charset="UTF-8"/> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>MobiHub — Motoristas</title> 
  <script src="https://cdn.tailwindcss.com"></script> 
</head> 
<body class="bg-gray-50 min-h-screen pb-10"> 

<div class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10"> 
  <div class="flex items-center gap-3"> 
    <a href="/admin/dashboard" class="text-gray-500 hover:text-gray-700 text-sm">← Dashboard</a> 
    <span class="text-gray-300">|</span> 
    <span class="font-semibold text-gray-900">Motoristas</span> 
  </div> 
  <button onclick="sair()" class="text-sm text-gray-500 border border-gray-200 px-3 py-1.5 rounded-lg">Sair</button> 
</div> 

<div class="max-w-2xl mx-auto px-4 py-6 space-y-6"> 

  <!-- LISTA RESUMIDA --> 
  <div> 
    <div class="flex items-center justify-between mb-3"> 
      <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">Motoristas</h2> 
      <button onclick="carregarMotoristas()" class="text-xs text-green-600 hover:text-green-800">↻ Atualizar</button> 
    </div> 
    <div id="lista-motoristas" class="space-y-3"></div> 
  </div> 

</div> 

<!-- MODAL DETALHES --> 
<div id="modal-detalhes" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-start justify-center p-4 z-50 overflow-y-auto"> 
  <div class="bg-white rounded-2xl max-w-2xl w-full my-8"> 
    <div class="flex items-center justify-between p-5 border-b border-gray-200"> 
      <h3 id="modal-titulo" class="font-semibold text-gray-900 text-lg">Detalhes do Motorista</h3> 
      <button onclick="fecharModalDetalhes()" class="text-gray-500 hover:text-gray-700 text-xl font-bold">✕</button> 
    </div> 

    <div id="modal-conteudo" class="p-5 space-y-5"> 
    </div> 

    <!-- AÇÕES FINAIS --> 
    <div id="modal-acoes" class="p-5 border-t border-gray-200"> 
    </div> 
  </div> 
</div> 

<!-- MODAL DOCUMENTO --> 
<div id="modal-documento" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 z-50"> 
  <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden flex flex-col"> 
    <div class="flex items-center justify-between p-4 border-b border-gray-200"> 
      <h3 id="modal-doc-titulo" class="font-semibold text-gray-900">Visualizar documento</h3> 
      <button onclick="fecharModalDocumento()" class="text-gray-500 hover:text-gray-700 text-xl font-bold">✕</button> 
    </div> 
    <div id="modal-doc-conteudo" class="flex-1 overflow-auto p-4 flex items-center justify-center"> 
    </div> 
  </div> 
</div> 

<script> 
const token = () => localStorage.getItem('mobihub_token') 
const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token()}` }) 

const isLoginPage = window.location.pathname === '/admin/login';
const tokenVal = localStorage.getItem('mobihub_token');

if (!tokenVal && !isLoginPage) {
  location.href = '/admin/login';
} 

let motoristaAtual = null

function sair() { localStorage.removeItem('mobihub_token'); location.href = '/admin/login' } 

// ── MODAL DOCUMENTO
function abrirModalDocumento(titulo, base64) {
  document.getElementById('modal-doc-titulo').textContent = titulo
  const conteudo = document.getElementById('modal-doc-conteudo')
  conteudo.innerHTML = ''
  
  if (base64.startsWith('data:application/pdf')) {
    const iframe = document.createElement('iframe')
    iframe.src = base64
    iframe.className = 'w-full h-[70vh]'
    conteudo.appendChild(iframe)
  } else {
    const img = document.createElement('img')
    img.src = base64
    img.className = 'max-w-full max-h-[80vh] rounded-lg'
    conteudo.appendChild(img)
  }
  
  document.getElementById('modal-documento').classList.remove('hidden')
}

function fecharModalDocumento() {
  document.getElementById('modal-documento').classList.add('hidden')
  document.getElementById('modal-doc-conteudo').innerHTML = ''
}

// ── MODAL DETALHES
function abrirModalDetalhes(d) {
  motoristaAtual = d

  const statusCor = d.status_cadastro === 'aprovado' ? 'bg-green-100 text-green-700' 
      : d.status_cadastro === 'pendente' ? 'bg-yellow-100 text-yellow-700' 
      : 'bg-red-100 text-red-700'
  const statusTexto = d.status_cadastro === 'aprovado' ? 'Aprovado' 
      : d.status_cadastro === 'pendente' ? 'Em Análise' 
      : 'Reprovado'

  document.getElementById('modal-titulo').textContent = d.nome

  // Conteúdo principal
  const conteudo = document.getElementById('modal-conteudo')
  conteudo.innerHTML = `
    <div>
      <h4 class="text-xs font-semibold text-gray-700 uppercase tracking-wide mb-2">Status</h4>
      <span class="px-2.5 py-1 rounded-full text-xs font-medium ${statusCor}">
        ${statusTexto}
      </span>
    </div>

    <div>
      <h4 class="text-xs font-semibold text-gray-700 uppercase tracking-wide mb-2">Dados Pessoais</h4>
      <div class="bg-gray-50 rounded-lg px-4 py-3 text-sm text-gray-600 space-y-1">
        <p><span class="font-medium">CPF:</span> ${d.cpf || '—'}</p>
        <p><span class="font-medium">Telefone:</span> ${d.telefone || '—'}</p>
        <p><span class="font-medium">Telegram ID:</span> ${d.telegram_id}</p>
      </div>
    </div>

    <div>
      <h4 class="text-xs font-semibold text-gray-700 uppercase tracking-wide mb-2">Veículo</h4>
      <div class="bg-gray-50 rounded-lg px-4 py-3 text-sm text-gray-600 space-y-1">
        <p><span class="font-medium">Marca/Modelo:</span> ${d.modelo_carro || '—'}</p>
        <p><span class="font-medium">Ano:</span> ${d.ano_carro || '—'}</p>
        <p><span class="font-medium">Cor:</span> ${d.cor_carro || '—'}</p>
        <p><span class="font-medium">Placa:</span> <span class="font-mono">${d.placa || '—'}</span></p>
        <p><span class="font-medium">Renavam:</span> ${d.renavam || '—'}</p>
      </div>
    </div>

    <div>
      <h4 class="text-xs font-semibold text-gray-700 uppercase tracking-wide mb-2">Documentos</h4>
      <div class="grid grid-cols-2 gap-2">
        <button ${d.crlv_base64 ? `onclick='abrirModalDocumento("CRLV", "${d.crlv_base64.replace(/'/g, "\\'")}")'` : `disabled`
          class="text-xs ${d.crlv_base64 
            ? 'text-gray-700 border border-gray-200 hover:bg-gray-50' 
            : 'text-gray-400 border border-gray-100 cursor-not-allowed'} rounded-lg py-2">
          ${d.crlv_base64 ? '👁️ Ver CRLV' : 'Documento ausente'}
        </button>
        ${d.cnh_digital_base64 
          ? `<button onclick='abrirModalDocumento("CNH Digital", "${d.cnh_digital_base64.replace(/'/g, "\\'")}")'
              class="text-xs text-gray-700 border border-gray-200 hover:bg-gray-50 rounded-lg py-2 col-span-2">
              📄 Ver CNH Digital
            </button>` 
          : `
          <button ${d.cnh_frente_base64 ? `onclick='abrirModalDocumento("CNH Frente", "${d.cnh_frente_base64.replace(/'/g, "\\'")}")'` : `disabled`
            class="text-xs ${d.cnh_frente_base64 
              ? 'text-gray-700 border border-gray-200 hover:bg-gray-50' 
              : 'text-gray-400 border border-gray-100 cursor-not-allowed'} rounded-lg py-2">
            ${d.cnh_frente_base64 ? '🖼️ Ver CNH Frente' : 'Documento ausente'}
          </button>
          <button ${d.cnh_verso_base64 ? `onclick='abrirModalDocumento("CNH Verso", "${d.cnh_verso_base64.replace(/'/g, "\\'")}")'` : `disabled`
            class="text-xs ${d.cnh_verso_base64 
              ? 'text-gray-700 border border-gray-200 hover:bg-gray-50' 
              : 'text-gray-400 border border-gray-100 cursor-not-allowed'} rounded-lg py-2">
            ${d.cnh_verso_base64 ? '🖼️ Ver CNH Verso' : 'Documento ausente'}
          </button>
          `}
      </div>
    </div>
  `

  // Ações
  const acoes = document.getElementById('modal-acoes')
  if (d.status_cadastro === 'pendente') {
    acoes.innerHTML = `
      <div class="mb-3">
        <label class="text-xs font-semibold text-gray-700 uppercase tracking-wide">Motivo da reprovação (opcional)</label>
        <input id="motivo-reprovacao" type="text" placeholder="Ex: Documento ilegível"
          class="mt-2 w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="reprovarMotorista()" 
          class="text-sm text-red-600 border border-red-200 rounded-xl py-3 hover:bg-red-50 font-semibold">
          ❌ Reprovar
        </button>
        <button onclick="aprovarMotorista()" 
          class="text-sm text-white bg-green-600 rounded-xl py-3 hover:bg-green-700 font-semibold">
          ✅ Aprovar
        </button>
      </div>
    `
  } else {
    acoes.innerHTML = `
      <div class="text-sm text-gray-500 text-center">
        Este motorista já foi ${statusTexto}.
      </div>
    `
  }

  document.getElementById('modal-detalhes').classList.remove('hidden')
}

function fecharModalDetalhes() {
  document.getElementById('modal-detalhes').classList.add('hidden')
  motoristaAtual = null
}

async function aprovarMotorista() {
  if (!motoristaAtual) return
  await fetch(`/api/drivers/${motoristaAtual.id}`, { 
    method: 'PUT', 
    headers: headers(), 
    body: JSON.stringify({ status_cadastro: 'aprovado', ativo: 1 }) 
  }) 
  fecharModalDetalhes()
  carregarMotoristas()
}

async function reprovarMotorista() {
  if (!motoristaAtual) return
  const motivo = document.getElementById('motivo-reprovacao').value.trim()
  await fetch(`/api/drivers/${motoristaAtual.id}`, { 
    method: 'PUT', 
    headers: headers(), 
    body: JSON.stringify({ status_cadastro: 'reprovado', ativo: 0, motivo_reprovacao: motivo || null }) 
  }) 
  fecharModalDetalhes()
  carregarMotoristas()
}

// ── LISTA ──────────────────────────────── 
async function carregarMotoristas() { 
  const r = await fetch('/api/drivers', { headers: headers() }) 
  if (r.status === 401) { location.href = '/admin/login'; return } 
  const lista = await r.json() 
  renderizarMotoristas(lista) 
} 

function renderizarMotoristas(lista) { 
  const div = document.getElementById('lista-motoristas') 
  if (!lista.length) { 
    div.innerHTML = '<p class="text-sm text-gray-400 text-center py-8">Nenhum motorista cadastrado ainda.</p>' 
    return 
  } 
  div.innerHTML = lista.map(d => { 
    const statusCor = d.status_cadastro === 'aprovado' ? 'bg-green-100 text-green-700' 
      : d.status_cadastro === 'pendente' ? 'bg-yellow-100 text-yellow-700' 
      : 'bg-red-100 text-red-700'
    const statusTexto = d.status_cadastro === 'aprovado' ? 'Aprovado' 
      : d.status_cadastro === 'pendente' ? 'Em Análise' 
      : 'Reprovado'
    
    return ` 
    <div class="bg-white border border-gray-200 rounded-xl p-4 flex items-center justify-between gap-4"> 
      <div class="flex items-center gap-3"> 
        <div class="w-12 h-12 rounded-full overflow-hidden flex-shrink-0 border-2 border-gray-200 ${d.foto_base64 ? '' : 'bg-green-100 flex items-center justify-center'}"> 
          ${d.foto_base64 
            ? `<img src="${d.foto_base64}" class="w-full h-full object-cover"/>` 
            : `<span class="text-green-700 font-bold text-lg">${d.nome.charAt(0).toUpperCase()}</span>` 
          } 
        </div> 
        <div> 
          <p class="font-semibold text-gray-900">${d.nome}</p> 
          <span class="px-2.5 py-0.5 rounded-full text-xs font-medium ${statusCor}"> 
            ${statusTexto} 
          </span> 
        </div> 
      </div> 
      <button onclick='abrirModalDetalhes(${JSON.stringify(d).replace(/'/g, "\\'")})'
        class="text-sm text-green-600 border border-green-200 rounded-lg px-4 py-2.5 hover:bg-green-50 font-semibold">
        🔍 Analisar
      </button>
    </div> 
  `}).join('') 
} 

carregarMotoristas() 
</script> 
</body> 
</html>
