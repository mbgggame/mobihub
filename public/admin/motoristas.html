<!DOCTYPE html> 
<html lang="pt-BR"> 
<head> 
  <meta charset="UTF-8"/> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>MobiHub Admin | Motoristas</title> 
  <script src="https://cdn.tailwindcss.com"></script> 
  <style> 
    .fade { transition: opacity 0.2s ease; } 
  </style> 
</head> 
<body class="bg-gray-50 min-h-screen"> 

<div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm"> 
  <div class="flex items-center gap-4"> 
    <a href="/admin" class="text-gray-500 hover:text-gray-700 text-sm">← Dashboard</a> 
    <h1 class="text-lg font-bold text-gray-900">👥 Motoristas</h1> 
  </div> 
  <div class="flex items-center gap-3"> 
    <span class="text-xs text-gray-400" id="ultima-att"></span> 
    <button onclick="carregar()" class="text-sm border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-gray-50">↻ Atualizar</button> 
    <button onclick="sair()" class="text-sm border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-gray-50">Sair</button> 
  </div> 
</div> 

<div class="max-w-7xl mx-auto px-6 py-6 space-y-5"> 

  <div class="grid grid-cols-4 gap-4"> 
    <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center"> 
      <p id="c-online" class="text-3xl font-bold text-green-700">—</p> 
      <p class="text-xs text-green-600 mt-1">Online</p> 
    </div> 
    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-center"> 
      <p id="c-corrida" class="text-3xl font-bold text-yellow-700">—</p> 
      <p class="text-xs text-yellow-600 mt-1">Em corrida</p> 
    </div> 
    <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center"> 
      <p id="c-disp" class="text-3xl font-bold text-blue-700">—</p> 
      <p class="text-xs text-blue-600 mt-1">Disponíveis</p> 
    </div> 
    <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 text-center"> 
      <p id="c-offline" class="text-3xl font-bold text-gray-600">—</p> 
      <p class="text-xs text-gray-500 mt-1">Offline</p> 
    </div> 
  </div> 

  <div class="bg-white border border-gray-200 rounded-xl p-4 flex flex-wrap gap-3 items-center"> 
    <input id="busca" type="text" placeholder="🔍 Nome ou placa..." oninput="filtrar()" 
      class="border border-gray-200 rounded-lg px-3 py-2 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-green-500"/> 
    <div class="flex gap-2 flex-wrap"> 
      <button onclick="setStatus('todos')" id="f-todos" class="fbtn active text-sm px-3 py-1.5 rounded-full bg-gray-800 text-white border border-gray-300">Todos</button> 
      <button onclick="setStatus('online')" id="f-online" class="fbtn text-sm px-3 py-1.5 rounded-full border border-green-300 text-green-700">🟢 Online</button> 
      <button onclick="setStatus('corrida')" id="f-corrida" class="fbtn text-sm px-3 py-1.5 rounded-full border border-yellow-300 text-yellow-700">🚗 Em corrida</button> 
      <button onclick="setStatus('disponivel')" id="f-disponivel" class="fbtn text-sm px-3 py-1.5 rounded-full border border-blue-300 text-blue-700">✅ Disponível</button> 
      <button onclick="setStatus('offline')" id="f-offline" class="fbtn text-sm px-3 py-1.5 rounded-full border border-gray-300 text-gray-600">⚫ Offline</button> 
    </div> 
    <select id="ordem" onchange="filtrar()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"> 
      <option value="nome">Por nome</option> 
      <option value="status">Por status</option> 
      <option value="corridas">Por corridas hoje</option> 
      <option value="ganhos">Por ganhos hoje</option> 
      <option value="avaliacao">Por avaliação</option> 
    </select> 
  </div> 

  <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden"> 
    <table class="w-full"> 
      <thead class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase tracking-wider"> 
        <tr> 
          <th class="text-left px-5 py-3">Nome</th> 
          <th class="text-left px-5 py-3">Veículo</th> 
          <th class="text-left px-5 py-3">Status</th> 
          <th class="text-left px-5 py-3">Localização</th> 
          <th class="text-left px-5 py-3">Corrida atual</th> 
          <th class="text-right px-5 py-3">Ganhos hoje</th> 
          <th class="text-center px-5 py-3">Corridas</th> 
          <th class="text-center px-5 py-3">Avaliação</th> 
          <th class="text-center px-5 py-3">Ações</th> 
        </tr> 
      </thead> 
      <tbody id="tbody" class="divide-y divide-gray-100 fade"></tbody> 
    </table> 
  </div> 
</div> 

<script> 
const tk = localStorage.getItem('mobihub_token') 
if (!tk) location.href = '/admin/login' 
const H = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${tk}` }) 

let dados = [] 
let statusAtivo = 'todos' 

function sair() { localStorage.removeItem('mobihub_token'); location.href = '/admin/login' } 

function setStatus(s) { 
  statusAtivo = s 
  document.querySelectorAll('.fbtn').forEach(b => { 
    b.className = b.className.replace('bg-gray-800 text-white', '').trim() 
  }) 
  const btn = document.getElementById('f-' + s) 
  if (btn) { btn.classList.add('bg-gray-800', 'text-white') } 
  filtrar() 
} 

function td(d) { 
  if (!d) return '—' 
  const s = Math.floor((Date.now() - new Date(d)) / 1000) 
  if (s < 60) return s + 's' 
  if (s < 3600) return Math.floor(s/60) + 'min' 
  return Math.floor(s/3600) + 'h' + Math.floor((s%3600)/60) + 'min' 
} 

function filtrar() { 
  const busca = document.getElementById('busca').value.toLowerCase() 
  const ordem = document.getElementById('ordem').value 

  let lista = dados.filter(m => { 
    const ok = !busca || m.nome?.toLowerCase().includes(busca) || m.placa?.toLowerCase().includes(busca) 
    const ec = m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status) 
    const disp = m.online === 1 && !ec 
    if (statusAtivo === 'todos') return ok 
    if (statusAtivo === 'online') return ok && m.online === 1 
    if (statusAtivo === 'corrida') return ok && ec 
    if (statusAtivo === 'disponivel') return ok && disp 
    if (statusAtivo === 'offline') return ok && !m.online 
    return ok 
  }) 

  lista.sort((a, b) => { 
    if (ordem === 'corridas') return (b.corridas_hoje||0) - (a.corridas_hoje||0) 
    if (ordem === 'ganhos') return (b.ganhos_hoje||0) - (a.ganhos_hoje||0) 
    if (ordem === 'avaliacao') return (b.media_avaliacao||0) - (a.media_avaliacao||0) 
    if (ordem === 'status') return (b.online||0) - (a.online||0) 
    return (a.nome||'').localeCompare(b.nome||'') 
  }) 

  const tbody = document.getElementById('tbody') 
  if (!lista.length) { 
    tbody.innerHTML = '<tr><td colspan="9" class="text-center text-gray-400 py-10">Nenhum motorista encontrado</td></tr>' 
    return 
  } 

  tbody.innerHTML = lista.map(m => { 
    const ec = m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status) 
    const disp = m.online === 1 && !ec 
    const badge = ec ? '<span class="px-2 py-0.5 rounded-full text-xs bg-yellow-100 text-yellow-700 border border-yellow-200">🚗 Em corrida</span>' 
      : disp ? '<span class="px-2 py-0.5 rounded-full text-xs bg-green-100 text-green-700 border border-green-200">🟢 Disponível</span>' 
      : '<span class="px-2 py-0.5 rounded-full text-xs bg-gray-100 text-gray-600 border border-gray-200">⚫ Offline</span>' 
    const veiculo = [m.modelo_carro, m.cor_carro].filter(v => v && v !== 'Não informado').join(' ') 
    const loc = m.location_at && m.segundos_sem_update < 300 ? td(m.location_at) + ' atrás' : m.online ? '⚠️ Sem localização' : '—' 
    const corrida = ec ? `<p class="text-xs text-gray-700 truncate max-w-xs">${m.origem||'—'} → ${m.destino||'—'}</p>${m.passageiro_nome ? `<p class="text-xs text-gray-400">👤 ${m.passageiro_nome}</p>` : ''}` : '<span class="text-gray-300">—</span>' 
    const aprov = m.status_cadastro === 'aprovado' 
    return `<tr class="hover:bg-gray-50"> 
      <td class="px-5 py-3"> 
        <p class="font-medium text-sm text-gray-900">${m.nome}</p> 
        ${m.balance_due > 0 ? `<p class="text-xs text-red-500">💸 R$ ${Number(m.balance_due).toFixed(2)}</p>` : ''} 
      </td> 
      <td class="px-5 py-3"> 
        <p class="text-sm text-gray-800">${veiculo || '—'}</p> 
        <p class="text-xs text-gray-400 font-mono">${m.placa||'—'}</p> 
      </td> 
      <td class="px-5 py-3">${badge}</td> 
      <td class="px-5 py-3 text-sm text-gray-500">${loc}</td> 
      <td class="px-5 py-3">${corrida}</td> 
      <td class="px-5 py-3 text-right text-sm font-semibold text-green-700">R$ ${Number(m.ganhos_hoje||0).toFixed(2)}</td> 
      <td class="px-5 py-3 text-center text-sm text-gray-800">${m.corridas_hoje||0}</td> 
      <td class="px-5 py-3 text-center text-sm">⭐ ${Number(m.media_avaliacao||0).toFixed(1)}</td> 
      <td class="px-5 py-3 text-center"> 
        <div class="flex items-center justify-center gap-1"> 
          ${aprov ? `<button onclick="toggle(${m.id},${m.ativo})" class="text-xs px-2 py-1 rounded border ${m.ativo ? 'border-red-200 text-red-600' : 'border-green-200 text-green-600'}">${m.ativo ? '⛔' : '✅'}</button>` : ''} 
          ${m.token_perfil ? `<a href="/motorista/${m.token_perfil}" target="_blank" class="text-xs px-2 py-1 rounded border border-blue-200 text-blue-600">🚗</a>` : ''} 
          <button onclick="location.href='/admin/motoristas/${m.id}'" class="text-xs px-2 py-1 rounded border border-gray-200 text-gray-600">🔍</button> 
        </div> 
      </td> 
    </tr>` 
  }).join('') 

  // Contadores 
  const online = dados.filter(m => m.online === 1).length 
  const corrida = dados.filter(m => m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status)).length 
  const disp = dados.filter(m => m.online === 1 && !(m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status))).length 
  const offline = dados.filter(m => !m.online).length 
  document.getElementById('c-online').textContent = online 
  document.getElementById('c-corrida').textContent = corrida 
  document.getElementById('c-disp').textContent = disp 
  document.getElementById('c-offline').textContent = offline 
} 

async function toggle(id, ativo) { 
  await fetch(`/api/admin/drivers/${id}/toggle`, { method: 'PUT', headers: H(), body: JSON.stringify({ ativo: ativo ? 0 : 1 }) }) 
  carregar() 
} 

async function carregar() { 
  try { 
    const r = await fetch('/api/admin/motoristas/realtime', { headers: H() }) 
    if (!r.ok) { location.href = '/admin/login'; return } 
    dados = await r.json() 
    filtrar() 
    document.getElementById('ultima-att').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR') 
  } catch(e) { console.error(e) } 
} 

carregar() 
setInterval(carregar, 15000) 
</script> 
</body> 
</html>
