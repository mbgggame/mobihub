<!DOCTYPE html> 
<html lang="pt-BR"> 
<head> 
  <meta charset="UTF-8"/> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>MobiHub Admin | Motoristas</title> 
  <script src="https://cdn.tailwindcss.com"></script> 
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"> 
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script> 
  <style> 
    .fade { transition: opacity 0.2s ease; } 
  </style> 
</head> 
<body class="bg-gray-50 min-h-screen"> 

<div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm"> 
  <div class="flex items-center gap-4"> 
    <a href="/admin" class="text-gray-500 hover:text-gray-700 text-sm">← Dashboard</a> 
    <h1 class="text-lg font-bold text-gray-900">👥 Motoristas</h1> 
  </div> 
  <div class="flex items-center gap-3"> 
    <span class="text-xs text-gray-400" id="ultima-att"></span> 
    <button onclick="carregar()" class="text-sm border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-gray-50">↻ Atualizar</button> 
    <button onclick="sair()" class="text-sm border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-gray-50">Sair</button> 
  </div> 
</div> 

<div class="max-w-7xl mx-auto px-6 py-6 space-y-5"> 

  <div class="grid grid-cols-4 gap-4"> 
    <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center"> 
      <p id="c-online" class="text-3xl font-bold text-green-700">—</p> 
      <p class="text-xs text-green-600 mt-1">Online</p> 
    </div> 
    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-center"> 
      <p id="c-corrida" class="text-3xl font-bold text-yellow-700">—</p> 
      <p class="text-xs text-yellow-600 mt-1">Em corrida</p> 
    </div> 
    <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center"> 
      <p id="c-disp" class="text-3xl font-bold text-blue-700">—</p> 
      <p class="text-xs text-blue-600 mt-1">Disponíveis</p> 
    </div> 
    <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 text-center"> 
      <p id="c-offline" class="text-3xl font-bold text-gray-600">—</p> 
      <p class="text-xs text-gray-500 mt-1">Offline</p> 
    </div> 
  </div> 

  <div class="bg-white border border-gray-200 rounded-xl p-4 flex flex-wrap gap-3 items-center"> 
    <input id="busca" type="text" placeholder="🔍 Nome ou placa..." oninput="filtrar()" 
      class="border border-gray-200 rounded-lg px-3 py-2 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-green-500"/> 
    <div class="flex gap-2 flex-wrap"> 
      <button onclick="setStatus('todos')" id="f-todos" class="fbtn active text-sm px-3 py-1.5 rounded-full bg-gray-800 text-white border border-gray-300">Todos</button> 
      <button onclick="setStatus('online')" id="f-online" class="fbtn text-sm px-3 py-1.5 rounded-full border border-green-300 text-green-700">🟢 Online</button> 
      <button onclick="setStatus('corrida')" id="f-corrida" class="fbtn text-sm px-3 py-1.5 rounded-full border border-yellow-300 text-yellow-700">🚗 Em corrida</button> 
      <button onclick="setStatus('disponivel')" id="f-disponivel" class="fbtn text-sm px-3 py-1.5 rounded-full border border-blue-300 text-blue-700">✅ Disponível</button> 
      <button onclick="setStatus('offline')" id="f-offline" class="fbtn text-sm px-3 py-1.5 rounded-full border border-gray-300 text-gray-600">⚫ Offline</button> 
    </div> 
    <select id="ordem" onchange="filtrar()" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"> 
      <option value="nome">Por nome</option> 
      <option value="status">Por status</option> 
      <option value="corridas">Por corridas hoje</option> 
      <option value="ganhos">Por ganhos hoje</option> 
      <option value="avaliacao">Por avaliação</option> 
    </select> 
    <div class="flex items-center gap-2 ml-auto"> 
      <label class="text-xs text-gray-500">De:</label> 
      <input type="date" id="filtro-de" class="text-sm border border-gray-200 rounded-lg px-2 py-1"> 
      <label class="text-xs text-gray-500">Até:</label> 
      <input type="date" id="filtro-ate" class="text-sm border border-gray-200 rounded-lg px-2 py-1"> 
      <button onclick="aplicarPeriodo()" class="text-sm bg-green-600 text-white px-3 py-1 rounded-lg hover:bg-green-700">Aplicar</button> 
    </div> 
  </div> 

  <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden"> 
    <table class="w-full"> 
      <thead class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase tracking-wider"> 
        <tr> 
          <th class="text-left px-5 py-3">Nome</th> 
          <th class="text-left px-5 py-3">Veículo</th> 
          <th class="text-left px-5 py-3">Status</th> 
          <th class="text-left px-5 py-3">Localização</th> 
          <th class="text-left px-5 py-3">Corrida atual</th> 
          <th class="text-right px-5 py-3">Ganhos hoje</th> 
          <th class="text-center px-5 py-3">Corridas</th> 
          <th class="text-center px-5 py-3">Agendadas</th> 
          <th class="text-center px-5 py-3">Avaliação</th> 
          <th class="text-center px-5 py-3">Ações</th> 
        </tr> 
      </thead> 
      <tbody id="tbody" class="divide-y divide-gray-100 fade"></tbody> 
    </table> 
  </div> 

<!-- MODAL DETALHES DO MOTORISTA --> 
<div id="modal-motorista" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center p-4 z-50"> 
  <div class="bg-white rounded-2xl max-w-md w-full p-6 max-h-[90vh] overflow-y-auto"> 
    <div class="flex justify-between items-center mb-4"> 
      <h2 class="font-semibold text-lg">Detalhes do Motorista</h2> 
      <button onclick="fecharModalMotorista()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button> 
    </div> 
    <div id="modal-motorista-conteudo" class="space-y-3"></div> 
    <div class="mt-4"> 
      <button onclick="fecharModalMotorista()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg py-2 text-sm font-semibold transition-colors">Fechar</button> 
    </div> 
  </div> 
</div>

<!-- MODAL AGENDADAS --> 
<div id="modal-agendadas" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center p-4 z-50"> 
  <div class="bg-white rounded-2xl max-w-lg w-full p-6 max-h-screen overflow-y-auto"> 
    <div class="flex justify-between items-center mb-4"> 
      <h2 class="font-semibold text-lg">Corridas Agendadas</h2> 
      <button onclick="document.getElementById('modal-agendadas').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl">✕</button> 
    </div> 
    <div id="modal-agendadas-conteudo"></div> 
  </div> 
</div> 

<script> 
const tk = localStorage.getItem('mobihub_token') 
const H = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${tk}` }) 

let _mapboxToken = null 
async function getMapboxToken() { 
  if (_mapboxToken) return _mapboxToken 
  const r = await fetch('/api/config/mapbox') 
  const d = await r.json() 
  _mapboxToken = d.token 
  return _mapboxToken 
} 
async function geocodificar(lat, lng) { 
  const token = await getMapboxToken() 
  const r = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?access_token=${token}&language=pt&limit=1`) 
  const d = await r.json() 
  return d.features?.[0]?.place_name?.split(',').slice(0,2).join(',') || `${lat},${lng}` 
} 

function encurtarEnd(end) { 
  try { const o = JSON.parse(end); end = o.endereco || o.display_name || end } catch(e) {} 
  return end.split(',')[0].trim() 
}

document.addEventListener('DOMContentLoaded', () => { 
  const token = localStorage.getItem('mobihub_token') 
  if (!token) { 
    window.location.href = '/admin/login' 
    return 
  } 
  const hoje = new Date().toISOString().split('T')[0]
  document.getElementById('filtro-de').value = hoje
  document.getElementById('filtro-ate').value = hoje
  carregar() 
})

function aplicarPeriodo() {
  carregar()
}

let dados = [] 
let statusAtivo = 'todos' 

function isEmCorrida(m) { 
  return m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status) 
} 

function isDisponivel(m) { 
  return m.online === 1 && !isEmCorrida(m) 
} 

function sair() { localStorage.removeItem('mobihub_token'); location.href = '/admin/login' } 

function setStatus(s) { 
  statusAtivo = s 
  document.querySelectorAll('.fbtn').forEach(b => { 
    b.className = b.className.replace('bg-gray-800 text-white', '').trim() 
  }) 
  const btn = document.getElementById('f-' + s) 
  if (btn) { btn.classList.add('bg-gray-800', 'text-white') } 
  filtrar() 
} 

function td(d) { 
  if (!d) return '—' 
  const s = Math.floor((Date.now() - new Date(d)) / 1000) 
  if (s < 60) return s + 's' 
  if (s < 3600) return Math.floor(s/60) + 'min' 
  return Math.floor(s/3600) + 'h' + Math.floor((s%3600)/60) + 'min' 
} 

function renderLinha(m) { 
  let badge, badgeClass 
  if (isEmCorrida(m))       { badge = '🚗 Em corrida';  badgeClass = 'bg-yellow-100 text-yellow-800 border border-yellow-200' } 
  else if (isDisponivel(m)) { badge = '🟢 Disponível'; badgeClass = 'bg-green-100 text-green-800 border border-green-200' } 
  else                      { badge = '⚫ Offline';     badgeClass = 'bg-gray-100 text-gray-600 border border-gray-200' }

  const veiculo = [m.modelo_carro, m.cor_carro].filter(v => v && v !== 'Não informado').join(' ') 
  const loc = m.ultima_lat ? '⏳' : m.online ? '⚠️ Sem localização' : '—'
  let corrida = '<span class="text-gray-300">—</span>'
  if (m.corrida_atual) {
    const orig = encurtarEnd(m.corrida_atual.origem)
    const dest = encurtarEnd(m.corrida_atual.destino)
    corrida = `<p class="text-xs text-gray-700">${orig} → ${dest}</p>${m.passageiro_nome ? `<p class="text-xs text-gray-400">👤 ${m.passageiro_nome}</p>` : ''}`
  } 
  const aprov = m.status_cadastro === 'aprovado' 
  return ` 
    <td class="px-5 py-3"> 
      <p class="font-medium text-sm text-gray-900">${m.nome}</p> 
      ${m.balance_due > 0 ? `<p class="text-xs text-red-500">💸 R$ ${Number(m.balance_due).toFixed(2)}</p>` : ''} 
    </td> 
    <td class="px-5 py-3"> 
      <p class="text-sm text-gray-800">${veiculo || '—'}</p> 
      <p class="text-xs text-gray-400 font-mono">${m.placa||'—'}</p> 
    </td> 
    <td class="px-5 py-3"><span class="text-xs px-2 py-0.5 rounded-full font-medium ${badgeClass}">${badge}</span></td> 
    <td class="px-5 py-3 text-sm text-gray-500" data-loc="1">${loc}</td> 
    <td class="px-5 py-3">${corrida}</td> 
    <td class="px-5 py-3 text-right text-sm font-semibold text-green-700">R$ ${Number(m.ganhos_hoje||0).toFixed(2)}</td> 
    <td class="px-5 py-3 text-center text-sm text-gray-800">${m.corridas_hoje||0}</td> 
    ${(() => { 
        const agendadas = m.corridas_agendadas?.length || 0 
        return agendadas > 0 
          ? `<td class="px-4 py-3 text-center"><button onclick="verAgendadas(${m.id})" class="text-xs font-bold text-white bg-green-600 px-2 py-1 rounded-full hover:bg-green-700">${agendadas}</button></td>` 
          : `<td class="px-4 py-3 text-center text-gray-400">—</td>` 
      })()} 
    <td class="px-5 py-3 text-center text-sm">⭐ ${Number(m.media_avaliacao||0).toFixed(1)}</td> 
    <td class="px-5 py-3 text-center"> 
      <div class="flex items-center justify-center gap-1"> 
        ${aprov ? `<button onclick="toggle(${m.id},${m.ativo})" class="text-xs px-2 py-1 rounded border ${m.ativo ? 'border-red-200 text-red-600' : 'border-green-200 text-green-600'}">${m.ativo ? '⛔' : '✅'}</button>` : ''} 
        ${m.token_perfil ? `<a href="/motorista/${m.token_perfil}" target="_blank" class="text-xs px-2 py-1 rounded border border-blue-200 text-blue-600">🚗</a>` : ''} 
        <button onclick="abrirModalMotorista(${m.id})" class="text-xs px-2 py-1 rounded border border-gray-200 text-gray-600">🔍</button> 
      </div> 
    </td> 
  ` 
} 

function filtrar() { 
  const busca = document.getElementById('busca').value.toLowerCase() 
  const ordem = document.getElementById('ordem').value 

  let lista = dados.filter(m => { 
    const ok = !busca || m.nome?.toLowerCase().includes(busca) || m.placa?.toLowerCase().includes(busca) 
    if (statusAtivo === 'todos') return ok 
    if (statusAtivo === 'online') return ok && m.online === 1 
    if (statusAtivo === 'corrida') return ok && isEmCorrida(m) 
    if (statusAtivo === 'disponivel') return ok && isDisponivel(m) 
    if (statusAtivo === 'offline') return ok && !m.online 
    return ok 
  }) 

  lista.sort((a, b) => { 
    if (ordem === 'corridas') return (b.corridas_hoje||0) - (a.corridas_hoje||0) 
    if (ordem === 'ganhos') return (b.ganhos_hoje||0) - (a.ganhos_hoje||0) 
    if (ordem === 'avaliacao') return (b.media_avaliacao||0) - (a.media_avaliacao||0) 
    if (ordem === 'status') return (b.online||0) - (a.online||0) 
    return (a.nome||'').localeCompare(b.nome||'') 
  }) 

  const tbody = document.getElementById('tbody') 
  if (!tbody) return 
  
  if (!lista.length) { 
    tbody.innerHTML = '<tr><td colspan="10" class="text-center text-gray-400 py-10">Nenhum motorista encontrado</td></tr>' 
  } else { 
    lista.forEach((m, idx) => { 
      let tr = tbody.querySelector(`tr[data-id="${m.id}"]`) 
      if (!tr) { 
        tr = document.createElement('tr') 
        tr.dataset.id = m.id 
        tr.className = 'hover:bg-gray-50' 
      } 
      tr.innerHTML = renderLinha(m) 
      const rows = [...tbody.querySelectorAll('tr[data-id]')] 
      if (rows.indexOf(tr) !== idx) tbody.insertBefore(tr, rows[idx] || null) 
    }) 

    tbody.querySelectorAll('tr[data-id]').forEach(tr => { 
      if (!lista.find(m => String(m.id) === tr.dataset.id)) tr.remove() 
    }) 
  }

  // Contadores 
  document.getElementById('c-online').textContent = dados.filter(m => m.online === 1).length 
  document.getElementById('c-corrida').textContent = dados.filter(m => isEmCorrida(m)).length 
  document.getElementById('c-disp').textContent = dados.filter(m => isDisponivel(m)).length 
  document.getElementById('c-offline').textContent = dados.filter(m => !m.online).length 
  
  atualizarLocalizacoes()
}

async function atualizarLocalizacoes() { 
  await Promise.all(dados.filter(m => m.ultima_lat).map(async m => { 
    const cel = document.querySelector(`tr[data-id="${m.id}"] td[data-loc]`) 
    if (!cel) return 
    const end = await geocodificar(m.ultima_lat, m.ultima_lng) 
    cel.textContent = end 
  })) 
} 

async function toggle(id, ativo) { 
  await fetch(`/api/admin/drivers/${id}/toggle`, { method: 'PUT', headers: H(), body: JSON.stringify({ ativo: ativo ? 0 : 1 }) }) 
  carregar() 
}

async function abrirModalMotorista(id) { 
  const m = dados.find(x => String(x.id) === String(id)) 
  if (!m) return 

  let badge, badgeClass 
  if (isEmCorrida(m))       { badge = '🚗 Em corrida';  badgeClass = 'bg-yellow-100 text-yellow-800 border border-yellow-200' } 
  else if (isDisponivel(m)) { badge = '🟢 Disponível'; badgeClass = 'bg-green-100 text-green-800 border border-green-200' } 
  else                      { badge = '⚫ Offline';     badgeClass = 'bg-gray-100 text-gray-600 border border-gray-200' } 

  const veiculo = [m.modelo_carro, m.cor_carro].filter(v => v && v !== 'Não informado').join(' ') 

  let corridaAtualHTML = '' 
  let miniMapHTML = '' 

  if (m.corrida_atual) { 
    const orig = encurtarEnd(m.corrida_atual.origem) 
    const dest = encurtarEnd(m.corrida_atual.destino) 
    const aceitaEm = m.aceita_at ? new Date(m.aceita_at).toLocaleTimeString('pt-BR') : '—' 
    corridaAtualHTML = ` 
      <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-3 space-y-1"> 
        <p class="text-xs text-yellow-600 font-semibold">🚗 Corrida Atual</p> 
        <p class="text-sm font-medium text-gray-800">${orig} → ${dest}</p> 
        <p class="text-sm text-green-700 font-semibold">R$ ${Number(m.corrida_atual.valor||0).toFixed(2)}</p> 
        ${m.passageiro_nome ? `<p class="text-xs text-gray-500">👤 Passageiro: ${m.passageiro_nome}</p>` : ''} 
        <p class="text-xs text-gray-400">Aceita às ${aceitaEm}</p> 
      </div> 
    ` 
    if (m.corrida_atual.origem_lat && m.corrida_atual.destino_lat) { 
      miniMapHTML = `<div id="mapa-corrida-motorista" class="rounded-xl overflow-hidden" style="height:220px"></div>` 
    } 
  } 

  const statusCadastro = { 
    aprovado: '<span class="text-green-600 font-medium">✅ Aprovado</span>', 
    pendente:  '<span class="text-yellow-600 font-medium">⏳ Pendente</span>', 
    reprovado: '<span class="text-red-600 font-medium">❌ Reprovado</span>' 
  }[m.status_cadastro] || '—' 

  document.getElementById('modal-motorista-conteudo').innerHTML = ` 
    <div class="space-y-3"> 

      <!-- Cabeçalho --> 
      <div class="flex items-center gap-3"> 
        <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center text-green-700 font-bold text-xl"> 
          ${(m.nome||'?').charAt(0).toUpperCase()} 
        </div> 
        <div class="flex-1"> 
          <p class="font-semibold text-lg text-gray-900">${m.nome}</p> 
          <p class="text-xs text-gray-400">ID: ${m.id} · ${statusCadastro}</p> 
        </div> 
        <span class="text-xs px-2 py-1 rounded-full font-medium ${badgeClass}">${badge}</span> 
      </div> 

      <!-- Veículo --> 
      <div class="grid grid-cols-2 gap-2"> 
        <div class="bg-gray-50 rounded-lg p-3"> 
          <p class="text-xs text-gray-400">Veículo</p> 
          <p class="text-sm font-medium text-gray-800">${veiculo || '—'}</p> 
        </div> 
        <div class="bg-gray-50 rounded-lg p-3"> 
          <p class="text-xs text-gray-400">Placa</p> 
          <p class="text-sm font-medium font-mono text-gray-800">${m.placa || '—'}</p> 
        </div> 
      </div> 

      <!-- Stats --> 
      <div class="grid grid-cols-3 gap-2"> 
        <div class="bg-gray-50 rounded-lg p-3 text-center"> 
          <p class="text-xs text-gray-400">Avaliação</p> 
          <p class="text-base font-bold text-yellow-500">⭐ ${Number(m.media_avaliacao||0).toFixed(1)}</p> 
          <p class="text-xs text-gray-400">${m.total_avaliacoes||0} avaliações</p> 
        </div> 
        <div class="bg-gray-50 rounded-lg p-3 text-center"> 
          <p class="text-xs text-gray-400">Total viagens</p> 
          <p class="text-base font-bold text-gray-800">${m.total_viagens||0}</p> 
        </div> 
        <div class="bg-gray-50 rounded-lg p-3 text-center"> 
          <p class="text-xs text-gray-400">Ganhos hoje</p> 
          <p class="text-base font-bold text-green-700">R$ ${Number(m.ganhos_hoje||0).toFixed(2)}</p> 
        </div> 
      </div> 

      <!-- Corridas hoje --> 
      <div class="bg-gray-50 rounded-lg p-3 flex justify-between items-center"> 
        <p class="text-xs text-gray-400">Corridas hoje</p> 
        <p class="text-sm font-bold text-gray-800">${m.corridas_hoje||0}</p> 
      </div> 

      <!-- Telefone --> 
      ${m.telefone ? ` 
      <div class="bg-gray-50 rounded-lg p-3 flex justify-between items-center"> 
        <p class="text-xs text-gray-400">Telefone</p> 
        <a href="https://wa.me/55${m.telefone.replace(/\D/g,'')}" target="_blank" class="text-sm font-medium text-green-700 hover:underline">📱 ${m.telefone}</a> 
      </div>` : ''} 

      <!-- Corrida atual --> 
      ${corridaAtualHTML} 

      <!-- Última localização --> 
      ${m.ultima_lat ? ` 
      <div class="bg-gray-50 rounded-lg p-3 flex justify-between items-center"> 
        <p class="text-xs text-gray-400">Última localização</p> 
        <p class="text-xs text-gray-600" id="end-modal-${m.id}">⏳ carregando...</p> 
      </div>` : ''} 

      <!-- Saldo devedor com simulação de pagamento --> 
      ${m.balance_due > 0 ? ` 
      <div class="bg-red-50 border border-red-200 rounded-lg p-3"> 
        <div class="flex justify-between items-center"> 
          <p class="text-xs text-red-600 font-semibold">💸 Saldo Devedor</p> 
          <p class="text-base font-bold text-red-700">R$ ${Number(m.balance_due).toFixed(2)}</p> 
        </div> 
        <button onclick="simularPagamento(${m.id})" class="mt-2 w-full text-sm bg-red-600 text-white rounded-lg py-1.5 font-medium hover:bg-red-700">💳 Simular pagamento</button> 
      </div>` : ''} 

      <!-- Mini-mapa corrida atual --> 
      ${miniMapHTML} 

      <!-- Botões de ação --> 
      <div class="flex gap-2 pt-2 border-t border-gray-100"> 
        ${m.token_perfil ? ` 
        <a href="/motorista/${m.token_perfil}" target="_blank" 
          class="flex-1 text-center text-sm bg-blue-50 text-blue-700 border border-blue-200 rounded-lg py-2 font-medium hover:bg-blue-100"> 
          🚗 Ver painel 
        </a>` : ''} 
        ${m.status_cadastro === 'aprovado' ? ` 
        <button onclick="toggle(${m.id},${m.ativo}); fecharModalMotorista()" 
          class="flex-1 text-sm ${m.ativo ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'} rounded-lg py-2 font-medium"> 
          ${m.ativo ? '⛔ Desativar' : '✅ Ativar'} 
        </button>` : ''} 
        ${m.corridas_agendadas?.length > 0 ? ` 
        <button onclick="verAgendadas(${m.id})" 
          class="flex-1 text-sm bg-green-600 text-white rounded-lg py-2 font-medium hover:bg-green-700"> 
          🗓️ ${m.corridas_agendadas.length} Agendada(s) 
        </button>` : ''} 
      </div> 

    </div> 
  ` 

  document.getElementById('modal-motorista').classList.remove('hidden') 

  // Geocodificar localização atual 
  if (m.ultima_lat) { 
    geocodificar(m.ultima_lat, m.ultima_lng).then(end => { 
      const el = document.getElementById(`end-modal-${m.id}`) 
      if (el) el.textContent = end 
    }) 
  } 

  // Mini-mapa da corrida atual 
  if (m.corrida_atual?.origem_lat && m.corrida_atual?.destino_lat) { 
    try { 
      const token = await getMapboxToken() 
      const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${m.corrida_atual.origem_lng},${m.corrida_atual.origem_lat};${m.corrida_atual.destino_lng},${m.corrida_atual.destino_lat}?access_token=${token}&geometries=geojson&overview=full` 
      const resp = await fetch(url) 
      const data = await resp.json() 
      const geometry = data.routes?.[0]?.geometry 
      const mapaDiv = document.getElementById('mapa-corrida-motorista') 
      if (mapaDiv) { 
        const map = new mapboxgl.Map({ 
          container: 'mapa-corrida-motorista', 
          style: 'mapbox://styles/mapbox/streets-v12', 
          accessToken: token, 
          center: [m.corrida_atual.origem_lng, m.corrida_atual.origem_lat], 
          zoom: 11 
        }) 
        map.on('load', () => { 
          new mapboxgl.Marker({ color: '#16a34a' }).setLngLat([m.corrida_atual.origem_lng, m.corrida_atual.origem_lat]).addTo(map) 
          new mapboxgl.Marker({ color: '#dc2626' }).setLngLat([m.corrida_atual.destino_lng, m.corrida_atual.destino_lat]).addTo(map) 
          if (geometry) { 
            map.addSource('rota', { type: 'geojson', data: { type: 'Feature', geometry } }) 
            map.addLayer({ id: 'rota', type: 'line', source: 'rota', paint: { 'line-color': '#2563eb', 'line-width': 3 } }) 
            const bounds = new mapboxgl.LngLatBounds() 
            geometry.coordinates.forEach(c => bounds.extend(c)) 
            map.fitBounds(bounds, { padding: 40 }) 
          } 
        }) 
      } 
    } catch(e) { console.error('Erro mapa:', e) } 
  } 
}

async function simularPagamento(id) { 
  if (!confirm('Confirmar pagamento do saldo devedor?')) return 
  try { 
    const r = await fetch(`/api/admin/drivers/${id}/pagar-saldo`, { 
      method: 'POST', 
      headers: H(), 
      body: '{}' 
    }) 
    const d = await r.json() 
    if (r.ok) { 
      alert('✅ Pagamento registrado com sucesso!') 
      fecharModalMotorista() 
      carregar() 
    } else { 
      alert('Erro: ' + (d.error || d.message || 'Tente novamente')) 
    } 
  } catch(e) { 
    alert('Erro de conexão') 
  } 
} 

function fecharModalMotorista() {
  document.getElementById('modal-motorista').classList.add('hidden')
}

function verAgendadas(id) { 
  const m = dados.find(x => String(x.id) === String(id))
  if (!m || !m.corridas_agendadas?.length) return 
  document.getElementById('modal-agendadas-conteudo').innerHTML = m.corridas_agendadas.map(c => ` 
    <div class="border border-gray-100 rounded-xl p-3 mb-2"> 
      <p class="text-xs text-gray-500 mb-1">🗓️ ${new Date(c.agendada_para).toLocaleString('pt-BR')}</p> 
      <p class="text-sm font-medium">${encurtarEnd(c.origem)} → ${encurtarEnd(c.destino)}</p> 
      <p class="text-sm text-green-700 font-semibold">R$ ${Number(c.valor).toFixed(2)}</p> 
    </div> 
  `).join('') 
  document.getElementById('modal-agendadas').classList.remove('hidden') 
} 

async function carregar() { 
  try { 
    const de = document.getElementById('filtro-de')?.value || ''
    const ate = document.getElementById('filtro-ate')?.value || ''
    const params = new URLSearchParams()
    if (de) params.append('de', de)
    if (ate) params.append('ate', ate)
    const url = `/api/admin/motoristas/realtime${params.toString() ? '?' + params.toString() : ''}`
    const r = await fetch(url, { headers: H() }) 
    if (!r.ok) { location.href = '/admin/login'; return } 
    dados = await r.json() 
    filtrar() 
    document.getElementById('ultima-att').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR') 
  } catch(e) { console.error(e) } 
} 

setInterval(carregar, 15000) 

// Atualizar texto de localização a cada 30 segundos
setInterval(() => { 
  document.querySelectorAll('tr[data-id]').forEach(row => { 
    const id = parseInt(row.dataset.id)
    const m = dados.find(m => m.id === id)
    if (!m) return
    const locCell = row.querySelector('[data-loc="1"]')
    if (locCell && m.location_at && m.segundos_sem_update < 300) { 
      locCell.textContent = td(m.location_at) + ' atrás' 
    } 
  }) 
}, 30000) 
</script>
