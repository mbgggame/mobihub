<!DOCTYPE html> 
<html lang="pt-BR"> 
<head> 
  <meta charset="UTF-8"/> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>MobiHub Admin | Motoristas</title> 
  <script src="https://cdn.tailwindcss.com"></script> 
</head> 
<body class="bg-gray-50 min-h-screen pb-10"> 

<div class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10"> 
  <div class="flex items-center gap-3"> 
    <a href="/admin/dashboard" class="text-gray-500 hover:text-gray-700 text-sm">← Dashboard</a> 
    <span class="text-gray-300">|</span> 
    <span class="font-semibold text-gray-900">Motoristas</span> 
  </div> 
  <button onclick="sair()" class="text-sm text-gray-500 border border-gray-200 px-3 py-1.5 rounded-lg">Sair</button> 
</div> 

<div class="max-w-lg mx-auto px-4 py-6 space-y-4"> 

  <!-- RESUMO --> 
  <div class="grid grid-cols-2 gap-3 mb-4 md:grid-cols-4"> 
    <div class="bg-green-50 border border-green-200 rounded-xl p-3 text-center"> 
      <p id="total-online" class="text-2xl font-bold text-green-700">0</p> 
      <p class="text-xs text-green-600">Online agora</p> 
    </div> 
    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-3 text-center"> 
      <p id="total-em-corrida" class="text-2xl font-bold text-yellow-700">0</p> 
      <p class="text-xs text-yellow-600">Em corrida</p> 
    </div> 
    <div class="bg-blue-50 border border-blue-200 rounded-xl p-3 text-center"> 
      <p id="total-disponiveis" class="text-2xl font-bold text-blue-700">0</p> 
      <p class="text-xs text-blue-600">Disponíveis</p> 
    </div> 
    <div class="bg-gray-50 border border-gray-200 rounded-xl p-3 text-center"> 
      <p id="total-offline" class="text-2xl font-bold text-gray-600">0</p> 
      <p class="text-xs text-gray-500">Offline</p> 
    </div> 
  </div> 

  <!-- FILTROS --> 
  <div class="bg-white border border-gray-200 rounded-xl p-3 mb-4 space-y-3"> 
    <input id="filtro-busca" type="text" placeholder="🔍 Buscar por nome ou placa..." 
      oninput="aplicarFiltros()" 
      class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/> 
    <div class="flex gap-2 flex-wrap"> 
      <button onclick="setFiltroStatus('todos')" id="filtro-todos" 
        class="filtro-btn ativo text-xs px-3 py-1.5 rounded-full border border-gray-300 bg-gray-800 text-white"> 
        Todos 
      </button> 
      <button onclick="setFiltroStatus('online')" id="filtro-online" 
        class="filtro-btn text-xs px-3 py-1.5 rounded-full border border-green-300 text-green-700"> 
        🟢 Online 
      </button> 
      <button onclick="setFiltroStatus('em_corrida')" id="filtro-em_corrida" 
        class="filtro-btn text-xs px-3 py-1.5 rounded-full border border-yellow-300 text-yellow-700"> 
        🚗 Em corrida 
      </button> 
      <button onclick="setFiltroStatus('disponivel')" id="filtro-disponivel" 
        class="filtro-btn text-xs px-3 py-1.5 rounded-full border border-blue-300 text-blue-700"> 
        ✅ Disponível 
      </button> 
      <button onclick="setFiltroStatus('offline')" id="filtro-offline" 
        class="filtro-btn text-xs px-3 py-1.5 rounded-full border border-gray-300 text-gray-600"> 
        ⚫ Offline 
      </button> 
    </div> 
    <div class="flex gap-2"> 
      <select id="filtro-ordenar" onchange="aplicarFiltros()" 
        class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"> 
        <option value="nome">Ordenar por nome</option> 
        <option value="online">Ordenar por status</option> 
        <option value="corridas">Ordenar por corridas hoje</option> 
        <option value="ganhos">Ordenar por ganhos hoje</option> 
        <option value="avaliacao">Ordenar por avaliação</option> 
      </select> 
    </div> 
  </div> 

  <!-- LISTA DE MOTORISTAS --> 
  <div id="lista-motoristas-realtime" class="space-y-3"></div> 

</div> 

<script> 
let todosMotoristas = [] 
let filtroStatus = 'todos' 
const token = localStorage.getItem('mobihub_token') 
if (!token) location.href = '/admin/login' 
const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }) 
 
function tempoDecorrido(data) { 
  if (!data) return '—' 
  const diff = Math.floor((Date.now() - new Date(data)) / 1000) 
  if (diff < 60) return `${diff}s` 
  if (diff < 3600) return `${Math.floor(diff/60)}min` 
  return `${Math.floor(diff/3600)}h${Math.floor((diff%3600)/60)}min` 
} 
 
function setFiltroStatus(status) { 
  filtroStatus = status 
  document.querySelectorAll('.filtro-btn').forEach(b => { 
    b.classList.remove('bg-gray-800', 'text-white', 'bg-green-600', 'bg-yellow-500', 'bg-blue-600') 
    b.classList.add('bg-white') 
  }) 
  const btn = document.getElementById(`filtro-${status}`) 
  if (btn) btn.classList.add('bg-gray-800', 'text-white') 
  aplicarFiltros() 
} 
 
function aplicarFiltros() { 
  const busca = document.getElementById('filtro-busca').value.toLowerCase() 
  const ordenar = document.getElementById('filtro-ordenar').value 
 
  let lista = todosMotoristas.filter(m => { 
    const matchBusca = !busca || 
      m.nome?.toLowerCase().includes(busca) || 
      m.placa?.toLowerCase().includes(busca) 
    
    const emCorrida = m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status) 
    const disponivel = m.online === 1 && !emCorrida 
    
    if (filtroStatus === 'todos') return matchBusca 
    if (filtroStatus === 'online') return matchBusca && m.online === 1 
    if (filtroStatus === 'em_corrida') return matchBusca && emCorrida 
    if (filtroStatus === 'disponivel') return matchBusca && disponivel 
    if (filtroStatus === 'offline') return matchBusca && !m.online 
    return matchBusca 
  }) 
 
  lista.sort((a, b) => { 
    if (ordenar === 'corridas') return (b.corridas_hoje || 0) - (a.corridas_hoje || 0) 
    if (ordenar === 'ganhos') return (b.ganhos_hoje || 0) - (a.ganhos_hoje || 0) 
    if (ordenar === 'avaliacao') return (b.media_avaliacao || 0) - (a.media_avaliacao || 0) 
    if (ordenar === 'online') return (b.online || 0) - (a.online || 0) 
    return (a.nome || '').localeCompare(b.nome || '') 
  }) 
 
  renderizarLista(lista) 
  atualizarContadores() 
} 
 
function atualizarContadores() { 
  const online = todosMotoristas.filter(m => m.online === 1).length 
  const emCorrida = todosMotoristas.filter(m => m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status)).length 
  const disponiveis = todosMotoristas.filter(m => m.online === 1 && !(m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status))).length 
  const offline = todosMotoristas.filter(m => !m.online).length 
 
  document.getElementById('total-online').textContent = online 
  document.getElementById('total-em-corrida').textContent = emCorrida 
  document.getElementById('total-disponiveis').textContent = disponiveis 
  document.getElementById('total-offline').textContent = offline 
} 
 
function renderizarLista(lista) { 
  const div = document.getElementById('lista-motoristas-realtime') 
  if (!lista.length) { 
    div.innerHTML = '<p class="text-center text-gray-400 py-8">Nenhum motorista encontrado</p>' 
    return 
  } 
 
  div.innerHTML = lista.map(m => { 
    const emCorrida = m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status) 
    const disponivel = m.online === 1 && !emCorrida 
    
    let statusBadge = '' 
    let cardBorder = 'border-gray-200' 
    
    if (emCorrida) { 
      statusBadge = '<span class="bg-yellow-500 text-white text-xs px-2 py-0.5 rounded-full">🚗 Em corrida</span>' 
      cardBorder = 'border-yellow-300' 
    } else if (disponivel) { 
      statusBadge = '<span class="bg-green-500 text-white text-xs px-2 py-0.5 rounded-full">🟢 Disponível</span>' 
      cardBorder = 'border-green-300' 
    } else { 
      statusBadge = '<span class="bg-gray-400 text-white text-xs px-2 py-0.5 rounded-full">⚫ Offline</span>' 
    } 
 
    const aprovado = m.status_cadastro === 'aprovado' 
 
    return ` 
      <div class="bg-white border ${cardBorder} rounded-xl p-4 space-y-3"> 
        <div class="flex items-start justify-between"> 
          <div class="flex-1"> 
            <div class="flex items-center gap-2 flex-wrap"> 
              <p class="font-semibold text-gray-900">${m.nome}</p> 
              ${statusBadge} 
              ${m.balance_due > 0 ? `<span class="bg-red-100 text-red-600 text-xs px-2 py-0.5 rounded-full">💸 R$ ${Number(m.balance_due).toFixed(2)}</span>` : ''} 
            </div> 
            <p class="text-xs text-gray-500 mt-0.5">${m.modelo_carro || ''} ${m.cor_carro || ''} • ${m.placa || '—'}</p> 
          </div> 
          <div class="text-right text-xs text-gray-400"> 
            <p>⭐ ${Number(m.media_avaliacao || 0).toFixed(1)} (${m.total_avaliacoes || 0})</p> 
            <p>${m.total_viagens || 0} viagens</p> 
          </div> 
        </div> 
 
        <div class="grid grid-cols-2 gap-2 text-xs"> 
          <div class="bg-gray-50 rounded-lg p-2 text-center"> 
            <p class="font-bold text-green-700">R$ ${Number(m.ganhos_hoje || 0).toFixed(2)}</p> 
            <p class="text-gray-500">Ganhos hoje</p> 
          </div> 
          <div class="bg-gray-50 rounded-lg p-2 text-center"> 
            <p class="font-bold text-blue-700">${m.corridas_hoje || 0}</p> 
            <p class="text-gray-500">Corridas hoje</p> 
          </div> 
        </div> 
 
        ${emCorrida ? ` 
          <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-xs space-y-1"> 
            <p class="font-semibold text-yellow-800">🚗 Corrida em andamento</p> 
            <p class="text-yellow-700">📍 ${m.origem || '—'}</p> 
            <p class="text-yellow-700">🏁 ${m.destino || '—'}</p> 
            <p class="text-yellow-600">💰 R$ ${Number(m.valor || 0).toFixed(2)} • 👤 ${m.passageiro_nome || '—'}</p> 
            <p class="text-yellow-500">⏱️ Iniciada há ${tempoDecorrido(m.aceita_at)}</p> 
          </div> 
        ` : ''} 
 
        ${m.location_at && m.segundos_sem_update < 300 ? ` 
          <p class="text-xs text-gray-400">📡 Última posição: ${tempoDecorrido(m.location_at)} atrás</p> 
        ` : m.online === 1 ? ` 
          <p class="text-xs text-orange-400">⚠️ Sem localização recente</p> 
        ` : ''} 
 
        <div class="flex gap-2 flex-wrap"> 
          ${aprovado ? ` 
            <button onclick="toggleAtivo(${m.id}, ${m.ativo})" 
              class="text-xs px-3 py-1.5 rounded-lg border ${m.ativo ? 'border-red-200 text-red-600 hover:bg-red-50' : 'border-green-200 text-green-600 hover:bg-green-50'}"> 
              ${m.ativo ? '⛔ Desativar' : '✅ Ativar'} 
            </button> 
          ` : ''} 
          <a href="/motorista/${m.token_perfil}" target="_blank" 
            class="text-xs px-3 py-1.5 rounded-lg border border-blue-200 text-blue-600 hover:bg-blue-50"> 
            🚗 Painel 
          </a> 
          <button onclick="analisarMotorista(${m.id})" 
            class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50"> 
            🔍 Analisar 
          </button> 
        </div> 
      </div> 
    ` 
  }).join('') 
} 
 
async function carregarMotoristas() { 
  try { 
    const r = await fetch('/api/admin/motoristas/realtime', { headers: headers() }) 
    if (!r.ok) { location.href = '/admin/login'; return } 
    todosMotoristas = await r.json() 
    aplicarFiltros() 
  } catch(e) { 
    console.error(e) 
  } 
} 
 
async function toggleAtivo(id, ativo) { 
  const r = await fetch(`/api/admin/drivers/${id}/toggle`, { 
    method: 'PUT', 
    headers: headers(), 
    body: JSON.stringify({ ativo: ativo ? 0 : 1 }) 
  }) 
  if (r.ok) carregarMotoristas() 
} 
 
function analisarMotorista(id) { 
  window.location.href = `/admin/motoristas/${id}` 
} 
 
function sair() { 
  localStorage.removeItem('mobihub_token'); 
  location.href = '/admin/login' 
} 
 
// Atualizar a cada 15 segundos automaticamente 
carregarMotoristas() 
setInterval(carregarMotoristas, 15000) 
</script> 
</body> 
</html>
