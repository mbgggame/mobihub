<!DOCTYPE html> 
<html lang="pt-BR"> 
<head> 
  <meta charset="UTF-8"/> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>MobiHub Admin | Motoristas</title> 
  <script src="https://cdn.tailwindcss.com"></script> 
</head> 
<body class="bg-gray-50 min-h-screen"> 

<div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10 shadow-sm"> 
  <div class="flex items-center gap-4"> 
    <a href="/admin/dashboard" class="text-gray-500 hover:text-gray-700 text-sm font-medium flex items-center gap-2"> 
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Dashboard
    </a> 
    <div class="h-6 w-px bg-gray-200"></div>
    <h1 class="text-lg font-bold text-gray-900">Motoristas</h1> 
  </div> 
  <div class="flex items-center gap-4"> 
    <div class="flex items-center gap-2 text-sm"> 
      <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse inline-block"></span> 
      <span class="text-gray-500">Auto-refresh ativo</span> 
      <span id="ultima-atualizacao" class="text-gray-400 text-xs"></span> 
    </div>
    <button onclick="carregarMotoristas()" class="text-sm text-gray-600 hover:text-gray-800 border border-gray-200 px-4 py-2 rounded-lg hover:bg-gray-50 transition-colors flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Atualizar agora
    </button>
    <button onclick="sair()" class="text-sm text-gray-600 border border-gray-200 px-4 py-2 rounded-lg hover:bg-gray-50 transition-colors">Sair</button> 
  </div> 
</div> 

<div class="max-w-7xl mx-auto px-6 py-6 space-y-6"> 

  <!-- RESUMO --> 
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4"> 
    <div class="bg-green-50 border border-green-200 rounded-xl p-5 text-center"> 
      <p id="total-online" class="text-3xl font-bold text-green-700">0</p> 
      <p class="text-xs text-green-600 uppercase tracking-wide mt-1">Online agora</p> 
    </div> 
    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-5 text-center"> 
      <p id="total-em-corrida" class="text-3xl font-bold text-yellow-700">0</p> 
      <p class="text-xs text-yellow-600 uppercase tracking-wide mt-1">Em corrida</p> 
    </div> 
    <div class="bg-blue-50 border border-blue-200 rounded-xl p-5 text-center"> 
      <p id="total-disponiveis" class="text-3xl font-bold text-blue-700">0</p> 
      <p class="text-xs text-blue-600 uppercase tracking-wide mt-1">Disponíveis</p> 
    </div> 
    <div class="bg-gray-50 border border-gray-200 rounded-xl p-5 text-center"> 
      <p id="total-offline" class="text-3xl font-bold text-gray-600">0</p> 
      <p class="text-xs text-gray-500 uppercase tracking-wide mt-1">Offline</p> 
    </div> 
  </div> 

  <!-- FILTROS --> 
  <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm"> 
    <div class="flex flex-wrap items-center gap-4"> 
      <input id="filtro-busca" type="text" placeholder="🔍 Buscar por nome ou placa..." 
        oninput="aplicarFiltros()" 
        class="w-full md:w-72 border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"/> 
      <div class="flex gap-2"> 
        <button onclick="setFiltroStatus('todos')" id="filtro-todos" 
          class="filtro-btn ativo text-sm px-4 py-2 rounded-full border border-gray-300 bg-gray-800 text-white transition-all"> 
          Todos 
        </button> 
        <button onclick="setFiltroStatus('online')" id="filtro-online" 
          class="filtro-btn text-sm px-4 py-2 rounded-full border border-green-300 text-green-700 hover:bg-green-50 transition-all"> 
          🟢 Online 
        </button> 
        <button onclick="setFiltroStatus('em_corrida')" id="filtro-em_corrida" 
          class="filtro-btn text-sm px-4 py-2 rounded-full border border-yellow-300 text-yellow-700 hover:bg-yellow-50 transition-all"> 
          🚗 Em corrida 
        </button> 
        <button onclick="setFiltroStatus('disponivel')" id="filtro-disponivel" 
          class="filtro-btn text-sm px-4 py-2 rounded-full border border-blue-300 text-blue-700 hover:bg-blue-50 transition-all"> 
          ✅ Disponível 
        </button> 
        <button onclick="setFiltroStatus('offline')" id="filtro-offline" 
          class="filtro-btn text-sm px-4 py-2 rounded-full border border-gray-300 text-gray-600 hover:bg-gray-50 transition-all"> 
          ⚫ Offline 
        </button> 
      </div> 
      <select id="filtro-ordenar" onchange="aplicarFiltros()" 
        class="border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"> 
        <option value="nome">Ordenar por nome</option> 
        <option value="online">Ordenar por status</option> 
        <option value="corridas">Ordenar por corridas hoje</option> 
        <option value="ganhos">Ordenar por ganhos hoje</option> 
        <option value="avaliacao">Ordenar por avaliação</option> 
      </select> 
    </div> 
  </div> 

  <!-- TABELA DE MOTORISTAS --> 
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden"> 
    <div class="overflow-x-auto"> 
      <table class="w-full"> 
        <thead class="bg-gray-50 border-b border-gray-200"> 
          <tr> 
            <th class="text-left text-xs font-semibold text-gray-600 uppercase tracking-wider px-6 py-4">Nome</th> 
            <th class="text-left text-xs font-semibold text-gray-600 uppercase tracking-wider px-6 py-4">Veículo</th> 
            <th class="text-left text-xs font-semibold text-gray-600 uppercase tracking-wider px-6 py-4">Status</th> 
            <th class="text-left text-xs font-semibold text-gray-600 uppercase tracking-wider px-6 py-4">Localização</th> 
            <th class="text-left text-xs font-semibold text-gray-600 uppercase tracking-wider px-6 py-4">Corrida Atual</th> 
            <th class="text-right text-xs font-semibold text-gray-600 uppercase tracking-wider px-6 py-4">Ganhos Hoje</th> 
            <th class="text-center text-xs font-semibold text-gray-600 uppercase tracking-wider px-6 py-4">Corridas</th> 
            <th class="text-center text-xs font-semibold text-gray-600 uppercase tracking-wider px-6 py-4">Avaliação</th> 
            <th class="text-center text-xs font-semibold text-gray-600 uppercase tracking-wider px-6 py-4">Ações</th> 
          </tr> 
        </thead> 
        <tbody id="tabela-motoristas" class="divide-y divide-gray-100"> 
        </tbody> 
      </table> 
    </div> 
    <div id="sem-motoristas" class="hidden py-12 text-center"> 
      <p class="text-gray-400">Nenhum motorista encontrado</p> 
    </div> 
  </div> 

</div> 

<script> 
let todosMotoristas = [] 
let filtroStatus = 'todos' 
let primeiraRenderizacao = true
const token = localStorage.getItem('mobihub_token') 
if (!token) location.href = '/admin/login' 
const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }) 
 
function tempoDecorrido(data) { 
  if (!data) return '—' 
  const diff = Math.floor((Date.now() - new Date(data)) / 1000) 
  if (diff < 60) return `${diff}s` 
  if (diff < 3600) return `${Math.floor(diff/60)}min` 
  return `${Math.floor(diff/3600)}h${Math.floor((diff%3600)/60)}min` 
} 
 
function setFiltroStatus(status) { 
  filtroStatus = status 
  document.querySelectorAll('.filtro-btn').forEach(b => { 
    b.classList.remove('bg-gray-800', 'text-white', 'bg-green-600', 'bg-yellow-500', 'bg-blue-600') 
    b.classList.add('bg-white') 
  }) 
  const btn = document.getElementById(`filtro-${status}`) 
  if (btn) btn.classList.add('bg-gray-800', 'text-white') 
  primeiraRenderizacao = true
  aplicarFiltros() 
} 
 
function aplicarFiltros() { 
  const busca = document.getElementById('filtro-busca').value.toLowerCase() 
  const ordenar = document.getElementById('filtro-ordenar').value 
 
  let lista = todosMotoristas.filter(m => { 
    const matchBusca = !busca || 
      m.nome?.toLowerCase().includes(busca) || 
      m.placa?.toLowerCase().includes(busca) 
    
    const emCorrida = m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status) 
    const disponivel = m.online === 1 && !emCorrida 
    
    if (filtroStatus === 'todos') return matchBusca 
    if (filtroStatus === 'online') return matchBusca && m.online === 1 
    if (filtroStatus === 'em_corrida') return matchBusca && emCorrida 
    if (filtroStatus === 'disponivel') return matchBusca && disponivel 
    if (filtroStatus === 'offline') return matchBusca && !m.online 
    return matchBusca 
  }) 
 
  lista.sort((a, b) => { 
    if (ordenar === 'corridas') return (b.corridas_hoje || 0) - (a.corridas_hoje || 0) 
    if (ordenar === 'ganhos') return (b.ganhos_hoje || 0) - (a.ganhos_hoje || 0) 
    if (ordenar === 'avaliacao') return (b.media_avaliacao || 0) - (a.media_avaliacao || 0) 
    if (ordenar === 'online') return (b.online || 0) - (a.online || 0) 
    return (a.nome || '').localeCompare(b.nome || '') 
  }) 
 
  renderizarTabela(lista) 
  atualizarContadores() 
} 
 
function atualizarContadores() { 
  const online = todosMotoristas.filter(m => m.online === 1).length 
  const emCorrida = todosMotoristas.filter(m => m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status)).length 
  const disponiveis = todosMotoristas.filter(m => m.online === 1 && !(m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status))).length 
  const offline = todosMotoristas.filter(m => !m.online).length 
 
  document.getElementById('total-online').textContent = online 
  document.getElementById('total-em-corrida').textContent = emCorrida 
  document.getElementById('total-disponiveis').textContent = disponiveis 
  document.getElementById('total-offline').textContent = offline 
} 

function hashMotorista(m) { 
  return `${m.online}-${m.corrida_status}-${m.corridas_hoje}-${m.ganhos_hoje}-${m.balance_due}-${m.corrida_id}` 
} 

function gerarRowMotorista(m) { 
  const emCorrida = m.corrida_id && ['aceita','em_viagem'].includes(m.corrida_status) 
  const disponivel = m.online === 1 && !emCorrida 
  
  let statusBadge = '' 
  let statusCor = ''
  
  if (emCorrida) { 
    statusBadge = '🚗 Em corrida'
    statusCor = 'bg-yellow-100 text-yellow-700 border-yellow-200'
  } else if (disponivel) { 
    statusBadge = '🟢 Disponível'
    statusCor = 'bg-green-100 text-green-700 border-green-200'
  } else { 
    statusBadge = '⚫ Offline'
    statusCor = 'bg-gray-100 text-gray-700 border-gray-200'
  } 

  const aprovado = m.status_cadastro === 'aprovado'
  const veiculoTexto = [m.modelo_carro, m.cor_carro].filter(Boolean).join(' • ') || '—'
  const localizacaoTexto = m.location_at && m.segundos_sem_update < 300 
    ? `${tempoDecorrido(m.location_at)} atrás` 
    : m.online === 1 
    ? '⚠️ Sem localização' 
    : '—'
  const corridaTexto = emCorrida 
    ? `${m.origem || '—'} → ${m.destino || '—'}` 
    : '—'

  return ` 
    <tr id="row-motorista-${m.id}" data-hash="${hashMotorista(m)}" class="hover:bg-gray-50 transition-colors"> 
      <td class="px-6 py-4"> 
        <div class="flex items-center gap-3"> 
          <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-green-700 font-bold text-lg overflow-hidden"> 
            ${m.nome?.charAt(0).toUpperCase() || '?'}
          </div> 
          <div> 
            <p class="font-medium text-gray-900">${m.nome}</p> 
            ${m.balance_due > 0 ? `<p class="text-xs text-red-600">💸 R$ ${Number(m.balance_due).toFixed(2)}</p>` : ''} 
          </div> 
        </div> 
      </td> 
      <td class="px-6 py-4"> 
        <div> 
          <p class="text-sm text-gray-900">${veiculoTexto}</p> 
          <p class="text-xs text-gray-500 font-mono">${m.placa || '—'}</p> 
        </div> 
      </td> 
      <td class="px-6 py-4"> 
        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border ${statusCor}"> 
          ${statusBadge} 
        </span> 
      </td> 
      <td class="px-6 py-4"> 
        <p class="text-sm text-gray-600 loc-time">${localizacaoTexto}</p> 
      </td> 
      <td class="px-6 py-4"> 
        <div class="max-w-xs">
          <p class="text-sm text-gray-900 truncate">${corridaTexto}</p>
          ${emCorrida && m.passageiro_nome ? `<p class="text-xs text-gray-500">👤 ${m.passageiro_nome}</p>` : ''}
        </div>
      </td> 
      <td class="px-6 py-4 text-right"> 
        <p class="text-sm font-semibold text-green-700">R$ ${Number(m.ganhos_hoje || 0).toFixed(2)}</p> 
      </td> 
      <td class="px-6 py-4 text-center"> 
        <p class="text-sm font-medium text-gray-900">${m.corridas_hoje || 0}</p> 
      </td> 
      <td class="px-6 py-4 text-center"> 
        <div class="flex items-center justify-center gap-1"> 
          <span class="text-yellow-400 text-sm">⭐</span> 
          <span class="text-sm font-medium text-gray-900">${Number(m.media_avaliacao || 0).toFixed(1)}</span> 
        </div> 
      </td> 
      <td class="px-6 py-4 text-center"> 
        <div class="flex items-center justify-center gap-2"> 
          ${aprovado ? ` 
            <button onclick="toggleAtivo(${m.id}, ${m.ativo})" 
              class="text-sm px-3 py-1.5 rounded-lg border ${m.ativo ? 'border-red-200 text-red-600 hover:bg-red-50' : 'border-green-200 text-green-600 hover:bg-green-50'} transition-colors"> 
              ${m.ativo ? '⛔ Desativar' : '✅ Ativar'} 
            </button> 
          ` : ''} 
          ${m.token_perfil ? ` 
            <a href="/motorista/${m.token_perfil}" target="_blank" 
              class="text-sm px-3 py-1.5 rounded-lg border border-blue-200 text-blue-600 hover:bg-blue-50 transition-colors"> 
              🚗 Painel 
            </a> 
          ` : ''}
          <button onclick="analisarMotorista(${m.id})" 
            class="text-sm px-3 py-1.5 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors"> 
            🔍 Analisar 
          </button> 
        </div> 
      </td> 
    </tr> 
  ` 
} 
 
function renderizarTabela(lista) { 
  const tbody = document.getElementById('tabela-motoristas') 
  const semMotoristas = document.getElementById('sem-motoristas') 
  
  if (!lista.length) { 
    tbody.innerHTML = '<tr><td colspan="9" class="text-center text-gray-400 py-8">Nenhum motorista encontrado</td></tr>' 
    semMotoristas.classList.add('hidden')
    return 
  } 
  
  semMotoristas.classList.add('hidden')

  if (primeiraRenderizacao) {
    tbody.innerHTML = lista.map(gerarRowMotorista).join('')
    primeiraRenderizacao = false
    return
  }

  // Atualizar apenas rows existentes ou adicionar novas
  lista.forEach(m => {
    const rowId = `row-motorista-${m.id}`
    const novoHtml = gerarRowMotorista(m)
    const rowExistente = document.getElementById(rowId)

    if (rowExistente) {
      if (rowExistente.dataset.hash !== hashMotorista(m)) {
        rowExistente.outerHTML = novoHtml
      }
    } else {
      tbody.insertAdjacentHTML('beforeend', novoHtml)
    }
  })

  // Remover rows que não estão mais na lista
  tbody.querySelectorAll('tr[id^="row-motorista-"]').forEach(row => {
    const id = parseInt(row.id.replace('row-motorista-', ''))
    if (!lista.find(m => m.id === id)) {
      row.remove()
    }
  })
} 
 
async function carregarMotoristas() { 
  try { 
    const r = await fetch('/api/admin/motoristas/realtime', { headers: headers() }) 
    if (!r.ok) { location.href = '/admin/login'; return } 
    const novosMotoristas = await r.json() 
    
    if (JSON.stringify(novosMotoristas) !== JSON.stringify(todosMotoristas)) { 
      todosMotoristas = novosMotoristas 
      requestAnimationFrame(() => {
        aplicarFiltros()
        reiniciarContador()
      })
    } else {
      reiniciarContador()
    }
  } catch(e) { 
    console.error(e) 
  } 
} 
 
function reiniciarContador() { 
  const el = document.getElementById('ultima-atualizacao') 
  if (el) el.textContent = `• ${new Date().toLocaleTimeString('pt-BR')}`
} 
 
async function toggleAtivo(id, ativo) { 
  const r = await fetch(`/api/admin/drivers/${id}/toggle`, { 
    method: 'PUT', 
    headers: headers(), 
    body: JSON.stringify({ ativo: ativo ? 0 : 1 }) 
  }) 
  if (r.ok) carregarMotoristas() 
} 
 
function analisarMotorista(id) { 
  window.location.href = `/admin/motoristas/${id}` 
} 
 
function sair() { 
  localStorage.removeItem('mobihub_token'); 
  location.href = '/admin/login' 
} 

// Atualizar texto de localização a cada 30 segundos
setInterval(() => { 
  document.querySelectorAll('tr[id^="row-motorista-"]').forEach(row => { 
    const id = parseInt(row.id.replace('row-motorista-', '')) 
    const m = todosMotoristas.find(m => m.id === id) 
    if (!m) return 
    const locCell = row.querySelector('.loc-time') 
    if (locCell && m.location_at && m.segundos_sem_update < 300) { 
      locCell.textContent = `${tempoDecorrido(m.location_at)} atrás` 
    } 
  }) 
}, 30000) 
 
// Inicializar
carregarMotoristas() 
setInterval(carregarMotoristas, 15000) 
</script> 
</body> 
</html>
