<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MobiHub — Gestão de Tarifas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- HEADER -->
  <div class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <a href="/admin" class="text-gray-500 hover:text-gray-700">← Voltar</a>
      <h1 class="font-bold text-gray-900">Gestão de Tarifas</h1>
    </div>
    <div class="flex gap-2"> 
      <a href="/admin/dashboard" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-xl px-4 py-2.5 text-sm font-semibold transition-colors">📊 Dashboard</a>
      <a href="/admin/relatorios" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-xl px-4 py-2.5 text-sm font-semibold transition-colors">📈 Relatórios</a>
    </div> 
  </div>

  <div class="max-w-6xl mx-auto p-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead class="bg-gray-50 text-xs text-gray-500 font-semibold uppercase tracking-wider">
            <tr>
              <th class="px-4 py-3 border-b border-gray-100">Nome</th>
              <th class="px-4 py-3 border-b border-gray-100">Dias</th>
              <th class="px-4 py-3 border-b border-gray-100">Horário</th>
              <th class="px-4 py-3 border-b border-gray-100">V. Mínimo</th>
              <th class="px-4 py-3 border-b border-gray-100">R$/Km</th>
              <th class="px-4 py-3 border-b border-gray-100">Km Mín.</th>
              <th class="px-4 py-3 border-b border-gray-100">Feriados</th>
              <th class="px-4 py-3 border-b border-gray-100">Ações</th>
            </tr>
          </thead>
          <tbody id="lista-tarifas" class="text-sm">
            <!-- Linhas inseridas via JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- SEÇÃO DE FERIADOS -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mt-6">
      <div class="px-4 py-4 border-b border-gray-100 flex items-center justify-between">
        <h2 class="font-bold text-gray-900">🗓️ Feriados</h2>
        <button onclick="aplicarTarifaFimSemana()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors">
          📅 Mesma tarifa do fim de semana
        </button>
      </div>
      <div class="p-4">
        <!-- Formulário para adicionar feriado -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6">
          <input type="date" id="novo-feriado-data" class="border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-green-500">
          <input type="text" id="novo-feriado-nome" placeholder="Nome do feriado" class="border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-green-500">
          <select id="novo-feriado-tipo" class="border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-green-500">
            <option value="nacional">Nacional</option>
            <option value="estadual">Estadual</option>
            <option value="municipal">Municipal</option>
          </select>
          <button onclick="adicionarFeriado()" class="bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg px-4 py-2 transition-colors">
            Adicionar
          </button>
        </div>

        <!-- Lista de feriados -->
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead class="bg-gray-50 text-xs text-gray-500 font-semibold uppercase tracking-wider">
              <tr>
                <th class="px-4 py-3 border-b border-gray-100">Data</th>
                <th class="px-4 py-3 border-b border-gray-100">Nome</th>
                <th class="px-4 py-3 border-b border-gray-100">Tipo</th>
                <th class="px-4 py-3 border-b border-gray-100">Horário</th>
                <th class="px-4 py-3 border-b border-gray-100">V. Mínimo</th>
                <th class="px-4 py-3 border-b border-gray-100">R$/Km</th>
                <th class="px-4 py-3 border-b border-gray-100">Km Mín.</th>
                <th class="px-4 py-3 border-b border-gray-100">Ações</th>
              </tr>
            </thead>
            <tbody id="lista-feriados" class="text-sm">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = () => localStorage.getItem('mobihub_token')
    const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token()}` })
    
    const isLoginPage = window.location.pathname === '/admin/login';
    const tokenVal = localStorage.getItem('mobihub_token');

    async function verifyToken() {
      if (!tokenVal) return false;
      try {
        const r = await fetch('/api/login/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tokenVal}` }
        });
        return r.ok;
      } catch {
        return false;
      }
    }

    async function init() {
      const isValid = await verifyToken();
      if (!isValid) {
        localStorage.removeItem('mobihub_token');
        location.href = '/admin/login';
      }
    }

    init();

    const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb']

    async function carregarTarifas() {
      try {
        const r = await fetch('/api/tarifas', { headers: headers() })
        const tarifas = await r.json()
        const tbody = document.getElementById('lista-tarifas')
        
        tbody.innerHTML = tarifas.map(t => `
          <tr class="hover:bg-gray-50 transition-colors">
            <td class="px-4 py-3 border-b border-gray-100">
              <input id="nome-${t.id}" type="text" value="${t.nome}" class="w-full bg-transparent border border-transparent hover:border-gray-200 focus:border-green-500 focus:bg-white rounded px-2 py-1 outline-none">
            </td>
            <td class="px-4 py-3 border-b border-gray-100">
              <div class="flex flex-wrap gap-1 max-w-[200px]">
                ${diasSemana.map((d, i) => `
                  <label class="flex items-center gap-1 text-[10px] cursor-pointer bg-gray-100 hover:bg-gray-200 px-1.5 py-0.5 rounded transition-colors">
                    <input type="checkbox" name="dias-${t.id}" value="${i}" ${t.dias.split(',').includes(i.toString()) ? 'checked' : ''} class="w-3 h-3 text-green-600 border-gray-300 rounded focus:ring-green-500">
                    ${d}
                  </label>
                `).join('')}
              </div>
            </td>
            <td class="px-4 py-3 border-b border-gray-100">
              <div class="flex items-center gap-1">
                <input id="inicio-${t.id}" type="time" value="${t.hora_inicio}" class="bg-transparent border border-transparent hover:border-gray-200 focus:border-green-500 focus:bg-white rounded px-1 py-0.5 outline-none text-xs">
                <span>-</span>
                <input id="fim-${t.id}" type="time" value="${t.hora_fim}" class="bg-transparent border border-transparent hover:border-gray-200 focus:border-green-500 focus:bg-white rounded px-1 py-0.5 outline-none text-xs">
              </div>
            </td>
            <td class="px-4 py-3 border-b border-gray-100">
              <input id="valor-min-${t.id}" type="number" step="0.5" value="${t.valor_minimo}" class="w-16 bg-transparent border border-transparent hover:border-gray-200 focus:border-green-500 focus:bg-white rounded px-2 py-1 outline-none">
            </td>
            <td class="px-4 py-3 border-b border-gray-100">
              <input id="valor-km-${t.id}" type="number" step="0.1" value="${t.valor_km}" class="w-16 bg-transparent border border-transparent hover:border-gray-200 focus:border-green-500 focus:bg-white rounded px-2 py-1 outline-none">
            </td>
            <td class="px-4 py-3 border-b border-gray-100">
              <input id="km-min-${t.id}" type="number" step="0.5" value="${t.km_minimo}" class="w-16 bg-transparent border border-transparent hover:border-gray-200 focus:border-green-500 focus:bg-white rounded px-2 py-1 outline-none">
            </td>
            <td class="px-4 py-3 border-b border-gray-100">
              <input id="feriados-${t.id}" type="checkbox" ${t.aplicar_feriados ? 'checked' : ''} class="w-4 h-4 text-green-600 border-gray-300 rounded focus:ring-green-500">
            </td>
            <td class="px-4 py-3 border-b border-gray-100">
              <button onclick="salvarTarifa(${t.id}, this)" class="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors">
                Salvar
              </button>
            </td>
          </tr>
        `).join('')
      } catch (err) {
        alert('Erro ao carregar tarifas')
      }
    }

    async function salvarTarifa(id, btn) {
      const dias = Array.from(document.querySelectorAll(`input[name="dias-${id}"]:checked`)).map(c => c.value).join(',')
      const body = {
        nome: document.getElementById(`nome-${id}`).value,
        dias: dias,
        hora_inicio: document.getElementById(`inicio-${id}`).value,
        hora_fim: document.getElementById(`fim-${id}`).value,
        valor_minimo: parseFloat(document.getElementById(`valor-min-${id}`).value),
        valor_km: parseFloat(document.getElementById(`valor-km-${id}`).value),
        km_minimo: parseFloat(document.getElementById(`km-min-${id}`).value),
        aplicar_feriados: document.getElementById(`feriados-${id}`).checked
      }

      btn.textContent = '...'
      btn.disabled = true

      try {
        const r = await fetch(`/api/tarifas/${id}`, {
          method: 'PUT',
          headers: headers(),
          body: JSON.stringify(body)
        })

        if (r.ok) {
          alert('Tarifa atualizada com sucesso!')
        } else {
          const d = await r.json()
          alert('Erro ao salvar: ' + (d.error || 'Erro desconhecido'))
        }
      } catch (err) {
        alert('Erro de conexão')
      } finally {
        btn.textContent = 'Salvar'
        btn.disabled = false
      }
    }

    async function carregarFeriados() {
      try {
        const r = await fetch('/api/feriados', { headers: headers() })
        const feriados = await r.json()
        const tbody = document.getElementById('lista-feriados')
        
        tbody.innerHTML = feriados.map(f => `
          <tr id="linha-feriado-${f.id}" class="hover:bg-gray-50 transition-colors">
            <td class="px-4 py-3 border-b border-gray-100" id="data-${f.id}">
              <span class="normal">${f.data.split('T')[0].split('-').reverse().join('/')}</span>
              <input type="date" id="edit-data-${f.id}" value="${f.data}" class="w-full bg-white border border-gray-200 rounded px-2 py-1 outline-none focus:border-green-500 hidden">
            </td>
            <td class="px-4 py-3 border-b border-gray-100" id="nome-${f.id}">
              <span class="normal">${f.nome}</span>
              <input type="text" id="edit-nome-${f.id}" value="${f.nome}" class="w-full bg-white border border-gray-200 rounded px-2 py-1 outline-none focus:border-green-500 hidden">
            </td>
            <td class="px-4 py-3 border-b border-gray-100" id="tipo-${f.id}">
              <span class="normal">${f.tipo}</span>
              <select id="edit-tipo-${f.id}" class="w-full bg-white border border-gray-200 rounded px-2 py-1 outline-none focus:border-green-500 hidden">
                <option value="nacional">Nacional</option>
                <option value="estadual">Estadual</option>
                <option value="municipal">Municipal</option>
              </select>
            </td>
            <td class="px-4 py-3 border-b border-gray-100" id="horario-${f.id}">
              <span class="normal">${f.horario_inicio || ''} - ${f.horario_fim || ''}</span>
              <div class="flex gap-1 hidden" id="edit-horario-${f.id}">
                <input type="time" id="edit-horario-inicio-${f.id}" value="${f.horario_inicio || ''}" class="w-1/2 bg-white border border-gray-200 rounded px-2 py-1 outline-none focus:border-green-500">
                <span>-</span>
                <input type="time" id="edit-horario-fim-${f.id}" value="${f.horario_fim || ''}" class="w-1/2 bg-white border border-gray-200 rounded px-2 py-1 outline-none focus:border-green-500">
              </div>
            </td>
            <td class="px-4 py-3 border-b border-gray-100" id="valor-min-${f.id}">
              <span class="normal">${f.valor_minimo ? f.valor_minimo.toFixed(2) : ''}</span>
              <input type="number" step="0.01" id="edit-valor-min-${f.id}" value="${f.valor_minimo || ''}" class="w-full bg-white border border-gray-200 rounded px-2 py-1 outline-none focus:border-green-500 hidden">
            </td>
            <td class="px-4 py-3 border-b border-gray-100" id="valor-km-${f.id}">
              <span class="normal">${f.valor_km ? f.valor_km.toFixed(1) : ''}</span>
              <input type="number" step="0.1" id="edit-valor-km-${f.id}" value="${f.valor_km || ''}" class="w-full bg-white border border-gray-200 rounded px-2 py-1 outline-none focus:border-green-500 hidden">
            </td>
            <td class="px-4 py-3 border-b border-gray-100" id="km-min-${f.id}">
              <span class="normal">${f.km_minimo ? f.km_minimo.toFixed(1) : ''}</span>
              <input type="number" step="0.1" id="edit-km-min-${f.id}" value="${f.km_minimo || ''}" class="w-full bg-white border border-gray-200 rounded px-2 py-1 outline-none focus:border-green-500 hidden">
            </td>
            <td class="px-4 py-3 border-b border-gray-100">
              <button id="btn-editar-${f.id}" onclick="editarFeriado(${f.id})" class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors mr-2">
                Editar
              </button>
              <button id="btn-salvar-${f.id}" onclick="salvarFeriado(${f.id})" class="bg-green-500 hover:bg-green-600 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors mr-2 hidden">
                Salvar
              </button>
              <button id="btn-remover-${f.id}" onclick="removerFeriado(${f.id})" class="bg-red-500 hover:bg-red-600 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors">
                Remover
              </button>
            </td>
          </tr>
        `).join('')
      } catch (err) {
        alert('Erro ao carregar feriados')
      }
    }

    function editarFeriado(id) {
      document.getElementById(`data-${id}`).querySelector('.normal').classList.add('hidden')
      document.getElementById(`edit-data-${id}`).classList.remove('hidden')
      
      document.getElementById(`nome-${id}`).querySelector('.normal').classList.add('hidden')
      document.getElementById(`edit-nome-${id}`).classList.remove('hidden')
      
      document.getElementById(`tipo-${id}`).querySelector('.normal').classList.add('hidden')
      const tipoSelect = document.getElementById(`edit-tipo-${id}`)
      const tipoAtual = document.getElementById(`tipo-${id}`).querySelector('.normal').textContent
      tipoSelect.value = tipoAtual
      tipoSelect.classList.remove('hidden')

      document.getElementById(`horario-${id}`).querySelector('.normal').classList.add('hidden')
      document.getElementById(`edit-horario-${id}`).classList.remove('hidden')

      document.getElementById(`valor-min-${id}`).querySelector('.normal').classList.add('hidden')
      document.getElementById(`edit-valor-min-${id}`).classList.remove('hidden')

      document.getElementById(`valor-km-${id}`).querySelector('.normal').classList.add('hidden')
      document.getElementById(`edit-valor-km-${id}`).classList.remove('hidden')

      document.getElementById(`km-min-${id}`).querySelector('.normal').classList.add('hidden')
      document.getElementById(`edit-km-min-${id}`).classList.remove('hidden')

      document.getElementById(`btn-editar-${id}`).classList.add('hidden')
      document.getElementById(`btn-salvar-${id}`).classList.remove('hidden')
    }

    async function salvarFeriado(id) {
      const data = document.getElementById(`edit-data-${id}`).value
      const nome = document.getElementById(`edit-nome-${id}`).value
      const tipo = document.getElementById(`edit-tipo-${id}`).value
      const horario_inicio = document.getElementById(`edit-horario-inicio-${id}`).value || null
      const horario_fim = document.getElementById(`edit-horario-fim-${id}`).value || null
      const valor_minimo = document.getElementById(`edit-valor-min-${id}`).value ? parseFloat(document.getElementById(`edit-valor-min-${id}`).value) : null
      const valor_km = document.getElementById(`edit-valor-km-${id}`).value ? parseFloat(document.getElementById(`edit-valor-km-${id}`).value) : null
      const km_minimo = document.getElementById(`edit-km-min-${id}`).value ? parseFloat(document.getElementById(`edit-km-min-${id}`).value) : null

      try {
        const r = await fetch(`/api/feriados/${id}`, {
          method: 'PUT',
          headers: headers(),
          body: JSON.stringify({ data, nome, tipo, horario_inicio, horario_fim, valor_minimo, valor_km, km_minimo })
        })

        if (r.ok) {
          await carregarFeriados()
        } else {
          const d = await r.json()
          alert('Erro ao salvar: ' + (d.error || 'Erro desconhecido'))
        }
      } catch (err) {
        alert('Erro de conexão')
      }
    }

    async function aplicarTarifaFimSemana() {
      try {
        const r = await fetch('/api/tarifas', { headers: headers() })
        const tarifas = await r.json()
        const tarifaFimSemana = tarifas.find(t => t.aplicar_feriados)

        if (!tarifaFimSemana) {
          alert('Nenhuma tarifa com "Feriados" marcada!')
          return
        }

        const rFeriados = await fetch('/api/feriados', { headers: headers() })
        const feriados = await rFeriados.json()

        for (const feriado of feriados) {
          const data = new Date(feriado.data)
          const diaSemana = data.getDay()
          if (diaSemana === 0 || diaSemana === 6) {
            continue
          }
          await fetch(`/api/feriados/${feriado.id}`, {
            method: 'PUT',
            headers: headers(),
            body: JSON.stringify({
              valor_minimo: tarifaFimSemana.valor_minimo,
              valor_km: tarifaFimSemana.valor_km,
              km_minimo: tarifaFimSemana.km_minimo
            })
          })
        }

        alert('Tarifa aplicada aos feriados que não são fim de semana!')
        await carregarFeriados()
      } catch (err) {
        alert('Erro ao aplicar tarifa!')
      }
    }

    async function adicionarFeriado() {
      const data = document.getElementById('novo-feriado-data').value
      const nome = document.getElementById('novo-feriado-nome').value
      const tipo = document.getElementById('novo-feriado-tipo').value

      if (!data || !nome) {
        alert('Data e nome são obrigatórios')
        return
      }

      try {
        const r = await fetch('/api/feriados', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ data, nome, tipo })
        })

        if (r.ok) {
          document.getElementById('novo-feriado-data').value = ''
          document.getElementById('novo-feriado-nome').value = ''
          await carregarFeriados()
        } else {
          const d = await r.json()
          alert('Erro ao adicionar: ' + (d.error || 'Erro desconhecido'))
        }
      } catch (err) {
        alert('Erro de conexão')
      }
    }

    async function removerFeriado(id) {
      if (!confirm('Tem certeza que deseja remover este feriado?')) return
      try {
        const r = await fetch(`/api/feriados/${id}`, {
          method: 'DELETE',
          headers: headers()
        })

        if (r.ok) {
          await carregarFeriados()
        } else {
          const d = await r.json()
          alert('Erro ao remover: ' + (d.error || 'Erro desconhecido'))
        }
      } catch (err) {
        alert('Erro de conexão')
      }
    }

    window.onload = () => {
      carregarTarifas()
      carregarFeriados()
    }
  </script>
</body>
</html>
