<!DOCTYPE html> 
<html lang="pt-BR"> 
<head> 
  <meta charset="UTF-8"/> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>MobiHub — Nova corrida</title> 
  <script src="https://cdn.tailwindcss.com"></script> 
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> 
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
</head> 
<body class="bg-gray-50 min-h-screen"> 
<div class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between"> 
  <div class="flex items-center gap-3"> 
    <a href="/admin" class="text-gray-500 hover:text-gray-700">← Voltar</a> 
    <span class="font-semibold text-gray-900">Nova corrida</span> 
  </div> 
  <div class="flex gap-2"> 
    <a href="/admin/dashboard" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-xl px-4 py-2.5 text-sm font-semibold transition-colors">📊 Dashboard</a> 
  </div> 
</div> 
 
<div class="max-w-lg mx-auto px-4 pt-4"> 
  <details class="bg-white border border-gray-200 rounded-xl mb-4"> 
    <summary class="px-4 py-3 cursor-pointer font-medium text-gray-700 text-sm"> 
      ⚙️ Configurar tabela de preços 
    </summary> 
    <div class="px-4 pb-4 grid grid-cols-3 gap-3 mt-2">

        <label class="text-xs text-gray-500">Valor mínimo (R$)</label>

      <div> 
        <label class="text-xs text-gray-500">R$ por km excedente</label> 
        <input id="cfg-valor-km" type="number" step="0.10"

<div class="max-w-lg mx-auto px-4 py-4 space-y-4"> 
 
  <div id="sucesso" class="hidden bg-green-50 border border-green-200 rounded-xl p-4"> 
    <p class="font-semibold text-green-800 mb-1">✅ Corrida criada e enviada para o grupo!</p>

    <div class="bg-white rounded-lg px-3 py-2 font-mono text-xs break-all border border-green-100" id="link-gerado"></div> 
    <div class="flex gap-2 mt-3"> 
      <button onclick="copiarLink()" class="flex-1 bg-green-600 text-white rounded-lg py-2 text-sm font-medium">Copiar link</button> 
      <button onclick="novaCorrida()" class="flex-1 border border-green-300 text-green-700 rounded-lg py-2 text-sm font-medium">Nova corrida</button> 
    </div> 
  </div> 
 
  <div id="formulario" class="space-y-4">

      <label class="text-xs text-gray-500 font-medium uppercase tracking-wide">Tipo de corrida</label> 
      <div class="flex gap-2 mt-1 mb-4"> 
        <button id="btn-tipo-normal" onclick="setTipoAdmin('normal')"

        <button id="btn-tipo-agendada" onclick="setTipoAdmin('agendada')"

      <input id="data-agendamento-admin" type="datetime-local"

    </div>

        <input id="busca-dest" type="text" placeholder="Ex: Aeroporto de Vitória, Shopping, Rua X número Y..." 
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/> 
      </div> 
      <div class="rounded-lg overflow-hidden border border-gray-100">

      <div id="resumo-valor" class="hidden bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 space-y-1"> 
        <p id="txt-distancia-resumo" class="text-sm text-gray-600"></p> 
        <p id="txt-valor-motorista" class="text-sm font-medium text-green-700"></p> 
        <p id="txt-valor-mobihub" class="text-sm font-medium text-blue-700"></p> 
      </div> 
    </div> 
 
    <div class="grid grid-cols-2 gap-4"> 
      <div> 
        <label class="text-xs text-gray-500 font-medium uppercase tracking-wide">Valor por km (R$)</label> 
        <input id="valor-km" type="number" step="0.01" min="0" placeholder="0,00" 
          class="mt-1 w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/> 
      </div> 
      <div> 
        <label class="text-xs text-gray-500 font-medium uppercase tracking-wide">Valor total (R$)</label> 
        <input id="valor" type="number" step="0.01" min="0" placeholder="0,00" 
          class="mt-1 w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"/> 
      </div>

    <div> 
      <label class="text-sm font-medium text-gray-700 mb-1">💳 Forma de Pagamento</label> 
      <select id="forma-pagamento" 
        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"> 
        <option value="1">💵 Dinheiro</option> 
        <option value="2">📱 Pix</option>

      </select> 
    </div> 

    <div id="erro" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-2.5"></div> 
 
    <button id="btn-criar" onclick="criar()" 
      class="w-full bg-green-600 hover:bg-green-700 text-white rounded-xl py-3.5 font-semibold text-base transition-colors"> 
      Criar e enviar para motoristas 
    </button> 
  </div> 
</div> 
 
<script> 
const token = () => localStorage.getItem('mobihub_token') 
const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token()}` }) 
 
const isLoginPage = window.location.pathname === '/admin/login';
const tokenVal = localStorage.getItem('mobihub_token');

if (!tokenVal && !isLoginPage) {
  location.href = '/admin/login';
} 
 
let map, geocoder 
 let marcadores = { origem: null, destino: null } 
 let pontos = { origem: null, destino: null } 
 let proximoPonto = 'origem' 
 
 // BUG FIX: Ícones do Leaflet 
 const iconeOrigem = L.icon({ 
   iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png', 
   shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png', 
   iconSize: [25, 41], 
   iconAnchor: [12, 41] 
 }); 
 
 const iconeDestino = L.icon({ 
   iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png', 
   shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png', 
   iconSize: [25, 41], 
   iconAnchor: [12, 41] 
 }); 
 
 function encurtarEndereco(endereco) { 
   try { 
     const obj = JSON.parse(endereco); 
     endereco = obj.endereco || obj.display_name || endereco; 
   } catch(e) {} 
   const partes = endereco.split(','); 
   return partes.slice(0, 2).join(',').trim(); 
 }

 function initMap() { 
   map = L.map('map').setView([-20.3155, -40.3128], 13) 
   fetch('/api/config/mapbox') 
     .then(r => r.json()) 
     .then(({ token }) => { 
       L.tileLayer(`https://api.mapbox.com/styles/v1/mapbox/streets-v12/tiles/{z}/{x}/{y}?access_token=${token}`, { 
         attribution: '© <a href="https://www.mapbox.com/">Mapbox</a> © <a href="https://www.openstreetmap.org/">OpenStreetMap</a>', 
         tileSize: 512, 
         zoomOffset: -1, 
         maxZoom: 19 
       }).addTo(map) 
     });
 
   map.on('click', async (e) => { 
     const { lat, lng } = e.latlng 
     const tipo = pontos.origem ? 'destino' : 'origem' 
     try { 
       const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`) 
       const d = await r.json() 
       if (d && d.display_name) marcarPonto(lat, lng, d.display_name, tipo) 
     } catch(err) { console.error(err) } 
   }) 
 } 
 
 function setTipoAdmin(tipo) { 
   const btnNormal = document.getElementById('btn-tipo-normal') 
   const btnAgendada = document.getElementById('btn-tipo-agendada') 
   const campoAg = document.getElementById('campo-agendamento-admin') 
 
   if (tipo === 'agendada') { 
     btnNormal.className = 'flex-1 bg-white border border-green-600 text-green-600 rounded-xl py-2.5 font-semibold text-sm transition-all' 
     btnAgendada.className = 'flex-1 bg-green-600 text-white rounded-xl py-2.5 font-semibold text-sm transition-all' 
     campoAg.classList.remove('hidden') 
      
     // Set default min date/time (2 hours from now) 
     const input = document.getElementById('data-agendamento-admin') 
     const agora = new Date() 
     const min = new Date(agora.getTime() + 2 * 60 * 60 * 1000) 
     input.min = min.toISOString().slice(0, 16) 
     if (!input.value) input.value = min.toISOString().slice(0, 16) 
     input.addEventListener('change', recalcular) 
   } else { 
     btnNormal.className = 'flex-1 bg-green-600 text-white rounded-xl py-2.5 font-semibold text-sm transition-all' 
     btnAgendada.className = 'flex-1 bg-white border border-green-600 text-green-600 rounded-xl py-2.5 font-semibold text-sm transition-all' 
     campoAg.classList.add('hidden') 
   } 
   recalcular() 
 } 
 
 function setupAutocomplete(inputId, tipo) { 
   const input = document.getElementById(inputId) 
   let timeout = null 
   input.addEventListener('input', () => { 
     if (timeout) clearTimeout(timeout) 
     timeout = setTimeout(async () => { 
       const query = input.value.trim() 
       if (query.length < 3) return 
       try { 
         const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=br`) 
         const d = await r.json() 
         if (d && d.length > 0) { 
           const res = d[0] 
           const lat = parseFloat(res.lat) 
           const lon = parseFloat(res.lon) 
           const endereco = res.display_name 
           marcarPonto(lat, lon, endereco, tipo) 
           map.setView([lat, lon], 15) 
         } 
       } catch(err) { console.error(err) } 
     }, 1000) 
   }) 
 } 
 
 function marcarPonto(lat, lng, endereco, tipo) { 
   if (marcadores[tipo]) map.removeLayer(marcadores[tipo]) 
 
   marcadores[tipo] = L.marker([lat, lng], { 
     icon: tipo === 'origem' ? iconeOrigem : iconeDestino, 
     title: tipo === 'origem' ? 'Origem' : 'Destino' 
   }).addTo(map) 
 
   pontos[tipo] = { lat, lng, endereco } 
 
   if (tipo === 'origem') { 
     document.getElementById('busca-orig').value = endereco.split(',').slice(0,3).join(', ') 
   } else { 
     document.getElementById('busca-dest').value = endereco.split(',').slice(0,3).join(', ') 
   } 
 
   if (pontos.origem && pontos.destino) { 
     const bounds = L.latLngBounds([pontos.origem.lat, pontos.origem.lng], [pontos.destino.lat, pontos.destino.lng]) 
     map.fitBounds(bounds, { padding: [60, 60] }) 
     calcularDistancia() 
   } 
 } 
 
 async function calcularDistancia() { 
   if (!pontos.origem || !pontos.destino) return 
    
   // Captura data para cálculo de tarifa 
   const tipoAdmin = document.getElementById('btn-tipo-agendada').classList.contains('bg-green-600') ? 'agendada' : 'normal' 
   const dataHora = tipoAdmin === 'agendada' ? document.getElementById('data-agendamento-admin').value : new Date().toISOString() 
 
   // Usando Haversine para cálculo de distância gratuito 
   const lat1 = pontos.origem.lat, lon1 = pontos.origem.lng 
   const lat2 = pontos.destino.lat, lon2 = pontos.destino.lng 
   const R = 6371; // km 
   const dLat = (lat2 - lat1) * Math.PI / 180 
   const dLon = (lon2 - lon1) * Math.PI / 180 
   const a = Math.sin(dLat/2) * Math.sin(dLat/2) + 
             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
             Math.sin(dLon/2) * Math.sin(dLon/2) 
   const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) 
   const distanciaKm = R * c 
   // Duração estimada simples (30km/h média urbana) 
   const duracaoMin = Math.round((distanciaKm / 30) * 60) 
 
   document.getElementById('txt-distancia').textContent = 
     `Distância: ${distanciaKm.toFixed(1)} km • Tempo estimado: ${duracaoMin} min` 
   document.getElementById('distancia-info').classList.remove('hidden') 
    
   // Busca tarifa dinâmica do servidor 
   try { 
     const r = await fetch(`/api/tarifas/calcular?data_hora=${encodeURIComponent(dataHora)}&distancia_km=${distanciaKm.toFixed(2)}`) 
     const d = await r.json() 
     if (r.ok) { 
       document.getElementById('txt-tarifa-aplicada').textContent = `Tarifa aplicada: ${d.tarifa}` 
       document.getElementById('txt-distancia-resumo').textContent = `Distância: ${distanciaKm.toFixed(2)} km` 
       document.getElementById('valor').value = d.valor.toFixed(2) 
       document.getElementById('txt-valor-motorista').textContent = `Motorista (70%): R$ ${d.valor_motorista.toFixed(2)}` 
       document.getElementById('txt-valor-mobihub').textContent = `MobiHub (30%): R$ ${d.valor_mobihub.toFixed(2)}` 
       document.getElementById('resumo-valor').classList.remove('hidden') 
     } 
   } catch (e) { 
     // Fallback se a API falhar 
     calcularValor(distanciaKm) 
   } 
 } 
 
function calcularValor(distanciaKm) { 
  const config = getConfig() 
  let valor 
  if (distanciaKm <= config.kmMinimo) { 
    valor = config.valorMinimo 
  } else { 
    const excedente = distanciaKm - config.kmMinimo 
    valor = config.valorMinimo + (excedente * config.valorKm) 
  } 
  const valorMotorista = valor * 0.70 
  const valorMobihub = valor * 0.30 
 
  document.getElementById('txt-distancia-resumo').textContent = 
    `Distância: ${distanciaKm.toFixed(2)} km` 
  document.getElementById('valor').value = valor.toFixed(2) 
  document.getElementById('txt-valor-motorista').textContent = 
    `Motorista (70%): R$ ${valorMotorista.toFixed(2)}` 
  document.getElementById('txt-valor-mobihub').textContent = 
    `MobiHub (30%): R$ ${valorMobihub.toFixed(2)}` 
  document.getElementById('resumo-valor').classList.remove('hidden') 
 
  return { valor, valorMotorista, valorMobihub } 
} 
 
function getConfig() { 
  return { 
    valorMinimo: parseFloat(localStorage.getItem('mobihub_valor_minimo') || '15'), 
    kmMinimo: parseFloat(localStorage.getItem('mobihub_km_minimo') || '7.5'), 
    valorKm: parseFloat(localStorage.getItem('mobihub_valor_km') || '2') 
  } 
} 
 
function salvarConfig() { 
  localStorage.setItem('mobihub_valor_minimo', document.getElementById('cfg-valor-minimo').value) 
  localStorage.setItem('mobihub_km_minimo', document.getElementById('cfg-km-minimo').value) 
  localStorage.setItem('mobihub_valor_km', document.getElementById('cfg-valor-km').value) 
  alert('Configurações salvas!') 
  recalcular() 
} 
 
function recalcular() { 
  if (pontos.origem && pontos.destino) calcularDistancia() 
} 
 
function carregarConfig() { 
  const config = getConfig() 
  document.getElementById('cfg-valor-minimo').value = config.valorMinimo 
  document.getElementById('cfg-km-minimo').value = config.kmMinimo 
  document.getElementById('cfg-valor-km').value = config.valorKm 
} 
 
function atualizarValorTotal(distanciaKm) { 
  calcularValor(distanciaKm) 
} 
 
document.getElementById('valor-km').addEventListener('input', (e) => { 
  // Mantemos o evento antigo apenas para atualizar o campo do config se o usuário mexer aqui
  document.getElementById('cfg-valor-km').value = e.target.value
  localStorage.setItem('mobihub_valor_km', e.target.value) 
  if (pontos.origem && pontos.destino) recalcular() 
}) 
 
window.onload = () => { 
  initMap() 
  setupAutocomplete('busca-orig', 'origem') 
  setupAutocomplete('busca-dest', 'destino') 
  carregarConfig() 
   
   // CORREÇÃO 5: Repetir Viagem
   const rOrigem = localStorage.getItem('repetir_origem')
   const rDestino = localStorage.getItem('repetir_destino')
   const rValor = localStorage.getItem('repetir_valor')
   const rTelefone = localStorage.getItem('repetir_telefone')
   const rOrigLat = localStorage.getItem('repetir_origem_lat')
   const rOrigLng = localStorage.getItem('repetir_origem_lng')
   const rDestLat = localStorage.getItem('repetir_destino_lat')
   const rDestLng = localStorage.getItem('repetir_destino_lng')

   if (rOrigem && rDestino) {
     document.getElementById('telefone').value = rTelefone || ''
     document.getElementById('valor').value = rValor || ''
     
     if (rOrigLat && rOrigLng) {
       origemLat = parseFloat(rOrigLat)
       origemLng = parseFloat(rOrigLng)
       origemEndereco = rOrigem
       document.getElementById('busca-orig').value = encurtarEndereco(rOrigem)
       marcarPonto(origemLat, origemLng, rOrigem, 'origem')
     }
     if (rDestLat && rDestLng) {
       destinoLat = parseFloat(rDestLat)
       destinoLng = parseFloat(rDestLng)
       destinoEndereco = rDestino
       document.getElementById('busca-dest').value = encurtarEndereco(rDestino)
       marcarPonto(destinoLat, destinoLng, rDestino, 'destino')
     }
     
     // Limpa o localStorage após preencher
     localStorage.removeItem('repetir_origem')
     localStorage.removeItem('repetir_destino')
     localStorage.removeItem('repetir_valor')
     localStorage.removeItem('repetir_telefone')
     localStorage.removeItem('repetir_origem_lat')
     localStorage.removeItem('repetir_origem_lng')
     localStorage.removeItem('repetir_destino_lat')
     localStorage.removeItem('repetir_destino_lng')
   }
} 
 
let linkGerado = '' 
 
async function criar() { 
  const telefone = document.getElementById('telefone').value.trim() 
  const erro = document.getElementById('erro') 
  erro.classList.add('hidden') 
 
  if (!pontos.origem || !pontos.destino) { erro.textContent = 'Marque origem e destino.'; erro.classList.remove('hidden'); return } 
 
  const distanciaKm = parseFloat(document.getElementById('txt-distancia-resumo') 
    .textContent.replace('Distância: ','').replace(' km','')) || 0 
  let valor = parseFloat(document.getElementById('valor').value) 
 
  if (!valor || valor <= 0) { erro.textContent = 'Informe o valor da corrida.'; erro.classList.remove('hidden'); return } 
 
  const valorMotorista = parseFloat((valor * 0.70).toFixed(2)) 
  const valorMobihub = parseFloat((valor * 0.30).toFixed(2)) 
 
  const tipoAdmin = document.getElementById('btn-tipo-agendada') 
    .classList.contains('bg-green-600') ? 'agendada' : 'normal' 
  const agendadaPara = tipoAdmin === 'agendada' 
    ? document.getElementById('data-agendamento-admin').value 
    : null 
 
  if (tipoAdmin === 'agendada' && !agendadaPara) { 
    erro.textContent = 'Informe a data e hora do agendamento.'; 
    erro.classList.remove('hidden'); 
    return; 
  } 
 
  const btn = document.getElementById('btn-criar') 
  btn.textContent = 'Enviando...' 
  btn.disabled = true 
 
  try { 
    const r = await fetch('/api/rides', { 
      method: 'POST', 
      headers: headers(), 
      body: JSON.stringify({ 
        origem: pontos.origem.endereco, origem_lat: pontos.origem.lat, origem_lng: pontos.origem.lng, 
        destino: pontos.destino.endereco, destino_lat: pontos.destino.lat, destino_lng: pontos.destino.lng, 
        valor, valor_motorista: valorMotorista, valor_mobihub: valorMobihub, 
        client_telefone: telefone || null, 
        tipo: tipoAdmin, 
        agendada_para: agendadaPara,
        forma_pagamento: document.getElementById('forma-pagamento').value
      }) 
    }) 
    const d = await r.json() 
    if (!r.ok) { erro.textContent = d.error; erro.classList.remove('hidden'); btn.textContent = 'Criar e enviar para motoristas'; btn.disabled = false; return } 
    linkGerado = d.link 
    document.getElementById('link-gerado').textContent = d.link 
    document.getElementById('formulario').classList.add('hidden') 
    document.getElementById('sucesso').classList.remove('hidden') 
  } catch { erro.textContent = 'Erro de conexão.'; erro.classList.remove('hidden'); btn.textContent = 'Criar e enviar para motoristas'; btn.disabled = false } 
} 
 
function copiarLink() { 
  navigator.clipboard.writeText(linkGerado) 
  alert('Link copiado!') 
} 
 
function novaCorrida() { 
  document.getElementById('formulario').classList.remove('hidden') 
  document.getElementById('sucesso').classList.add('hidden') 
  document.getElementById('telefone').value = '' 
  document.getElementById('busca-orig').value = '' 
  document.getElementById('busca-dest').value = '' 
  document.getElementById('valor').value = '' 
  document.getElementById('btn-criar').textContent = 'Criar e enviar para motoristas' 
  document.getElementById('btn-criar').disabled = false 
  document.getElementById('distancia-info').classList.add('hidden') 
  if (marcadores.origem) map.removeLayer(marcadores.origem) 
  if (marcadores.destino) map.removeLayer(marcadores.destino) 
  marcadores = { origem: null, destino: null } 
  pontos = { origem: null, destino: null } 
  proximoPonto = 'origem' 
} 
</script>
