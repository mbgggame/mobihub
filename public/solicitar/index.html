<!DOCTYPE html> 
<html lang="pt-BR"> 
<head> 
  <meta charset="UTF-8"/> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>MobiHub — Solicitar</title> 
  <script src="https://cdn.tailwindcss.com"></script> 
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> 
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
  <script src="/socket.io/socket.io.js"></script> 
  <style> 
    #map { height: 200px; border-radius: 12px; margin-bottom: 10px; z-index: 1; } 
    .autocomplete-list { position: absolute; z-index: 1000; background: white; width: 100%; border: 1px solid #e5e7eb; border-radius: 0.5rem; margin-top: 0.25rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); max-height: 200px; overflow-y: auto; } 
    .autocomplete-item { padding: 0.75rem 1rem; cursor: pointer; border-bottom: 1px solid #f3f4f6; font-size: 0.875rem; } 
    .autocomplete-item:hover { background: #f9fafb; } 
  </style> 
</head> 
<body class="bg-gray-50 min-h-screen pb-10"> 

<!-- CABEÇALHO --> 
<div class="bg-green-600 text-white px-4 py-3 flex items-center justify-between shadow sticky top-0 z-20"> 
  <div class="flex items-center gap-2"> 
    <span class="font-bold text-lg">MobiHub</span> 
  </div> 
  <button onclick="abrirModalHistorico()" class="text-xs bg-green-700 px-3 py-2 rounded-lg font-bold uppercase">🕒 Histórico</button> 
</div> 

<div id="conteudo-principal" class="max-w-lg mx-auto px-4 py-4 space-y-4"> 
  <!-- TELA 1: CADASTRO --> 
  <div id="tela-cadastro" class="hidden"> 
    <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm"> 
      <h2 class="font-bold text-xl text-gray-900 mb-1">Bem-vindo!</h2> 
      <p class="text-sm text-gray-500 mb-6">Identifique-se para solicitar sua primeira corrida.</p> 
      <div class="space-y-4"> 
        <input id="cad-nome" type="text" placeholder="Seu nome" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-green-500 outline-none"/> 
        <input id="cad-celular" type="tel" placeholder="Seu Celular (DDD + Número)" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-green-500 outline-none"/> 
        <button onclick="salvarCadastro()" class="w-full bg-green-600 text-white rounded-xl py-3.5 font-bold hover:bg-green-700 transition-all">Começar Agora</button> 
      </div> 
    </div> 
  </div> 

  <!-- TELA 2: SOLICITAR --> 
  <div id="tela-solicitar" class="hidden space-y-4"> 
    <div class="flex items-center justify-between bg-white p-4 rounded-xl border border-gray-100 shadow-sm"> 
        <div> 
            <p class="text-xs text-gray-400 uppercase font-bold tracking-tight">Passageiro</p> 
            <p class="font-bold text-gray-800"><span id="txt-nome-cliente">---</span> <span id="txt-nota-cliente" class="ml-2 text-yellow-500">⭐ 5.0</span></p> 
        </div> 
        <button onclick="trocarCadastro()" class="text-xs text-red-500 font-bold uppercase">Sair</button> 
    </div> 

    <div id="map"></div> 

    <div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm space-y-4"> 
      <div class="relative"> 
         <label class="text-[10px] font-bold text-gray-400 uppercase">📍 Local de Partida</label> 
         <input id="busca-orig" type="text" placeholder="Onde você está?" class="w-full border-b border-gray-100 py-2 text-sm focus:outline-none"/> 
         <div id="lista-orig" class="autocomplete-list hidden"></div> 
      </div> 
      <div class="relative"> 
        <label class="text-[10px] font-bold text-gray-400 uppercase">🏁 Para onde vamos?</label> 
        <input id="busca-dest" type="text" placeholder="Digite o destino..." class="w-full border-b border-gray-100 py-2 text-sm focus:outline-none"/> 
        <div id="lista-dest" class="autocomplete-list hidden"></div> 
      </div> 

      <div id="box-valor" class="hidden pt-2 text-center"> 
          <p class="text-xs text-gray-400 font-bold uppercase">Valor Estimado</p> 
          <p id="txt-valor" class="text-3xl font-black text-green-600">R$ 0,00</p> 
      </div> 

      <button id="btn-pedir" onclick="pedirCorrida()" disabled class="w-full bg-gray-200 text-gray-400 rounded-xl py-4 font-black uppercase tracking-wider cursor-not-allowed">Solicitar MobiHub</button> 
    </div> 
  </div> 
</div> 

<!-- MODAL HISTÓRICO --> 
<div id="modal-historico" class="fixed inset-0 bg-black/60 z-[100] hidden items-end justify-center"> 
    <div class="bg-white w-full max-w-lg rounded-t-3xl p-6 space-y-4 animate-slide-up"> 
        <div class="flex justify-between items-center border-b pb-4"> 
            <h2 class="font-black text-gray-800 uppercase">Últimas Corridas</h2> 
            <button onclick="fecharModalHistorico()" class="text-2xl font-bold text-gray-400">&times;</button> 
        </div> 
        <div id="lista-historico" class="space-y-3 max-h-[60vh] overflow-y-auto"> 
            <!-- Corridas aqui --> 
        </div> 
    </div> 
</div> 

<script> 
let cliente = { nome: '', telefone: '' }; 
let orig = null, dest = null, valorFinal = 0; 
let map, marcadores = { origem: null, destino: null };
const socket = io(); 

window.onload = () => { 
    const nome = localStorage.getItem('cliente_nome'); 
    const telefone = localStorage.getItem('cliente_telefone'); 
    
    if (nome && telefone) { 
        cliente = { nome, telefone }; 
        document.getElementById('txt-nome-cliente').innerText = nome; 
        mostrarTela('tela-solicitar'); 
        carregarReputacao(); 
        carregarHistorico();
    } else { 
        mostrarTela('tela-cadastro'); 
    } 
    initMap(); 
}; 

function mostrarTela(id) { 
    document.getElementById('tela-cadastro').classList.add('hidden'); 
    document.getElementById('tela-solicitar').classList.add('hidden'); 
    document.getElementById(id).classList.remove('hidden'); 
} 

function salvarCadastro() { 
    const nome = document.getElementById('cad-nome').value.trim(); 
    const tel = document.getElementById('cad-celular').value.trim(); 
    if(!nome || !tel) return alert('Preencha seu nome e celular!'); 
    
    localStorage.setItem('cliente_nome', nome); 
    localStorage.setItem('cliente_telefone', tel); 
    location.reload(); 
} 

function trocarCadastro() { 
    localStorage.removeItem('cliente_nome');
    localStorage.removeItem('cliente_telefone');
    localStorage.removeItem('cliente_email');
    localStorage.removeItem('mobi_cliente');
    location.reload(); 
} 

async function carregarReputacao() { 
    try { 
        const res = await fetch(`/api/client/reputation?telefone=${cliente.telefone}`); 
        const data = await res.json(); 
        document.getElementById('txt-nota-cliente').innerText = `⭐ ${data.media || '5.0'}`; 
    } catch(e) {} 
} 

async function carregarHistorico() {
    try {
        const res = await fetch(`/api/my-rides?telefone=${cliente.telefone}`);
        const data = await res.json();
        const listaDiv = document.getElementById('lista-historico');
        if (!data.rides || data.rides.length === 0) {
            listaDiv.innerHTML = '<p class="text-sm text-gray-500 text-center py-4">Nenhuma corrida encontrada.</p>';
            return;
        }
        listaDiv.innerHTML = data.rides.map(ride => {
            function encurtarEndereco(endereco) {
                try {
                    const obj = JSON.parse(endereco);
                    endereco = obj.endereco || obj.display_name || endereco;
                } catch(e) {}
                const partes = endereco.split(',');
                return partes.slice(0, 2).join(',').trim();
            }
            return `
                <div class="bg-gray-50 border border-gray-200 rounded-xl p-4">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <p class="text-sm font-semibold text-gray-800">${encurtarEndereco(ride.origem)} → ${encurtarEndereco(ride.destino)}</p>
                            <p class="text-xs text-gray-500 mt-1">${new Date(ride.created_at).toLocaleDateString('pt-BR')} • ${ride.status}</p>
                        </div>
                        <button onclick="repetirCorrida('${encodeURIComponent(encurtarEndereco(ride.origem))}', ${ride.origem_lat}, ${ride.origem_lng}, '${encodeURIComponent(encurtarEndereco(ride.destino))}', ${ride.destino_lat}, ${ride.destino_lng})"
                            class="text-xs bg-green-600 text-white px-3 py-1.5 rounded-lg hover:bg-green-700">
                            Repetir
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    } catch(e) {
        console.error('[HISTÓRICO]', e);
    }
}

function abrirModalHistorico() {
    const modal = document.getElementById('modal-historico');
    modal.classList.remove('hidden');
    modal.style.display = 'flex';
}

function fecharModalHistorico() {
    const modal = document.getElementById('modal-historico');
    modal.classList.add('hidden');
    modal.style.display = 'none';
}

// LOGICA DE REPETIR CORRIDA CORRIGIDA 
async function repetirCorrida(o_text_encoded, o_lat, o_lng, d_text_encoded, d_lat, d_lng) { 
    const o_text = decodeURIComponent(o_text_encoded);
    const d_text = decodeURIComponent(d_text_encoded);
    
    document.getElementById('busca-orig').value = o_text; 
    document.getElementById('busca-dest').value = d_text; 
    
    orig = { lat: o_lat, lng: o_lng, text: o_text }; 
    dest = { lat: d_lat, lng: d_lng, text: d_text }; 
    
    // Marca os pontos no mapa
    if (map) {
        if (marcadores.origem) map.removeLayer(marcadores.origem);
        if (marcadores.destino) map.removeLayer(marcadores.destino);

        const iconeOrigem = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
            shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41]
        });

        const iconeDestino = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
            shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41]
        });

        marcadores.origem = L.marker([o_lat, o_lng], { icon: iconeOrigem }).addTo(map);
        marcadores.destino = L.marker([d_lat, d_lng], { icon: iconeDestino }).addTo(map);

        const bounds = L.latLngBounds([o_lat, o_lng], [d_lat, d_lng]);
        map.fitBounds(bounds, { padding: [40, 40] });
    }
    
    fecharModalHistorico(); 
    
    // Força o cálculo do preço 
    calcularPreco(); 
} 

async function calcularPreco() { 
    if(!orig || !dest) return; 
    
    // Simulação de cálculo de distância (Haversine básico no front para destravar botão)
    const lat1 = orig.lat, lon1 = orig.lng;
    const lat2 = dest.lat, lon2 = dest.lng;
    const R = 6371; // km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    const distanciaKm = R * c;

    valorFinal = distanciaKm <= 2 ? 15 : 15 + ((distanciaKm - 2) * 2);
    document.getElementById('txt-valor').innerText = `R$ ${valorFinal.toFixed(2).replace('.', ',')}`; 
    document.getElementById('box-valor').classList.remove('hidden'); 
    
    const btn = document.getElementById('btn-pedir'); 
    btn.disabled = false; 
    btn.classList.remove('bg-gray-200', 'text-gray-400', 'cursor-not-allowed'); 
    btn.classList.add('bg-green-600', 'text-white'); 
} 

function initMap() {
    map = L.map('map').setView([-20.3155, -40.3128], 13);
    fetch('/api/config/mapbox')
        .then(r => r.json())
        .then(({ token }) => {
            L.tileLayer(`https://api.mapbox.com/styles/v1/mapbox/streets-v12/tiles/{z}/{x}/{y}?access_token=${token}`, {
                attribution: '© <a href="https://www.mapbox.com/">Mapbox</a> © <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
                tileSize: 512,
                zoomOffset: -1,
                maxZoom: 19
            }).addTo(map);
        });
    
    setupAutocomplete('busca-orig', 'origem');
    setupAutocomplete('busca-dest', 'destino');
}

function setupAutocomplete(inputId, tipo) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(tipo === 'origem' ? 'lista-orig' : 'lista-dest');
    let timeout = null;

    input.addEventListener('input', () => {
        if (timeout) clearTimeout(timeout);
        const query = input.value.trim();
        if (query.length < 3) {
            list.classList.add('hidden');
            return;
        }

        timeout = setTimeout(async () => {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=br&addressdetails=1&limit=5`);
                const d = await r.json();
                
                if (d && d.length > 0) {
                    list.innerHTML = d.map(res => {
                        function encurtarEndereco(endereco) {
                            const partes = endereco.split(',');
                            return partes.slice(0, 2).join(',').trim();
                        }
                        const enderecoCurto = encurtarEndereco(res.display_name);
                        return `
                            <div class="autocomplete-item" onclick="selecionarSugestao('${tipo}', '${res.display_name.replace(/'/g, "\\'")}', ${res.lat}, ${res.lon}, '${enderecoCurto.replace(/'/g, "\\'")}')">
                                ${enderecoCurto}
                            </div>
                        `;
                    }).join('');
                    list.classList.remove('hidden');
                } else {
                    list.classList.add('hidden');
                }
            } catch(err) { console.error(err) } 
        }, 400);
    });

    document.addEventListener('click', (e) => {
        setTimeout(() => {
            if (!input.contains(e.target) && !list.contains(e.target)) {
                list.classList.add('hidden');
            }
        }, 300);
    });
}

function selecionarSugestao(tipo, enderecoCompleto, lat, lon, enderecoCurto) {
    const input = document.getElementById(tipo === 'origem' ? 'busca-orig' : 'busca-dest');
    const list = document.getElementById(tipo === 'origem' ? 'lista-orig' : 'lista-dest');
    
    input.value = enderecoCurto;
    list.classList.add('hidden');

    if (tipo === 'origem') {
        orig = { lat, lng: lon, text: enderecoCurto };
    } else {
        dest = { lat, lng: lon, text: enderecoCurto };
    }

    // Marca o ponto no mapa
    if (map) {
        const icone = tipo === 'origem' 
            ? L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41]
            })
            : L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41]
            });

        if (marcadores[tipo]) map.removeLayer(marcadores[tipo]);
        marcadores[tipo] = L.marker([lat, lon], { icon: icone }).addTo(map);

        if (orig && dest) {
            const bounds = L.latLngBounds([orig.lat, orig.lng], [dest.lat, dest.lng]);
            map.fitBounds(bounds, { padding: [40, 40] });
        } else {
            map.setView([lat, lon], 15);
        }
    }

    calcularPreco();
}

async function pedirCorrida() {
    if (!orig || !dest) {
        alert('Selecione origem e destino!');
        return;
    }

    const btn = document.getElementById('btn-pedir');
    btn.disabled = true;
    btn.textContent = 'Solicitando...';

    try {
        const r = await fetch('/api/solicitar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nome: cliente.nome,
                celular: cliente.telefone,
                origem: orig.text,
                origem_lat: orig.lat,
                origem_lng: orig.lng,
                destino: dest.text,
                destino_lat: dest.lat,
                destino_lng: dest.lng,
                valor: valorFinal
            })
        });

        const d = await r.json();
        if (!r.ok) {
            alert('Erro: ' + (d.error || 'Tente novamente'));
            btn.disabled = false;
            btn.textContent = 'Solicitar MobiHub';
            return;
        }

        // Redireciona para a página de acompanhamento
        window.location.href = `/r/${d.token}`;
    } catch(e) {
        alert('Erro de conexão');
        btn.disabled = false;
        btn.textContent = 'Solicitar MobiHub';
    }
}
</script> 
</body> 
</html>
